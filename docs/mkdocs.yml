site_name: ExplorerLens Documentation
site_description: Advanced Windows Shell Extension for Thumbnail Generation
site_author: ExplorerLens Project
site_url: https://rajwanyair.github.io/ExplorerLens.io

repo_name: RajwanYair/ExplorerLens.io
repo_url: https://github.com/RajwanYair/ExplorerLens.io
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: INDEX.md

  - Architecture:
      - System Overview: architecture/system-overview.md
      - Decode Pipeline: architecture/decode-pipeline.md
      - Plugin System: architecture/plugin-architecture.md
      - Project Structure: architecture/PROJECT_STRUCTURE.md
      - Integration Architecture: architecture/INTEGRATION_ARCHITECTURE.md

  - Developer Guide:
      - Developer Guide: development/DEVELOPER_GUIDE.md
      - Build Quick Reference: development/BUILD_QUICK_REFERENCE.md
      - Third Party: development/THIRD_PARTY.md
      - Build from Source: build/BUILD_GUIDE.md
      - Build Requirements: build/BUILD_REQUIREMENTS.md
      - Build Scripts Reference: build/BUILD_SCRIPTS_REFERENCE.md
      - Build Monitoring: build/BUILD_MONITORING.md
      - Installation Guide: build/INSTALLATION_GUIDE.md
      - Installer Options: build/INSTALLER_OPTIONS.md
      - COM Registration: build/COM_REGISTRATION_DIAGNOSTICS.md
      - vcpkg Setup: build/VCPKG_SETUP_GUIDE.md
      - Code Signing: CODE_SIGNING.md

  - Formats:
      - Format Support Matrix: formats/FORMAT_SUPPORT_MATRIX.md
      - HEIF Validation: formats/HEIF_VALIDATION_STATUS.md
      - RAW Decoder: formats/RAW_DECODER_IMPLEMENTATION.md

  - GPU:
      - GPU Testing: gpu/GPU_TESTING_GUIDE.md
      - Performance Metrics: gpu/PERFORMANCE_METRICS.md

  - Plugins:
      - Plugin API: plugins/PLUGIN_API.md
      - Plugin Development: PLUGIN_DEVELOPMENT.md
      - Marketplace Protocol: plugins/PLUGIN_MARKETPLACE_PROTOCOL_V1.md
      - Package Format: plugins/PLUGIN_PACKAGE_FORMAT_V1.md
      - Sandbox Model: plugins/PLUGIN_SANDBOX_MODEL_V1.md
      - Security Guide: plugins/PluginSecurityGuide.md

  - Testing:
      - Testing Guide: testing/TESTING_GUIDE.md
      - User Guide: USER_GUIDE.md
      - Troubleshooting: TROUBLESHOOTING.md
      - Performance: PERFORMANCE.md

  - Engineering:
      - Learnings Log: LEARNINGS.md

  - Roadmap:
      - Roadmap v25.x (Rigel): ROADMAP_V25.md
      - Sprint Plan 861-960: SPRINT_PLAN_900.md
      - Sprint Plan 761-860: SPRINT_PLAN_800.md
      - Sprint Plan 661-760: SPRINT_PLAN_700.md
      - Sprint Plan 561-660: SPRINT_PLAN_600.md
      - Release Process: RELEASE_PROCESS.md
      - Archive:
          - Sprint Plan 461-560: archive/SPRINT_PLAN_500.md
          - Sprint Plan 301-460: archive/SPRINT_PLAN_400.md
          - Sprint Plan 201-300: archive/SPRINT_PLAN_300.md
          - Sprint Plan 101-200: archive/SPRINT_PLAN_200.md
          - Sprint Plan 1-100: archive/SPRINT_PLAN_100.md
          - WinUI3 Migration: archive/WINUI3_MIGRATION_PLAN.md

plugins:
  - search
  - tags

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/RajwanYair/ExplorerLens.io
    - icon: fontawesome/brands/discord
      link: https://discord.gg/ExplorerLens

copyright: Copyright &copy; 2024-2026 ExplorerLens Project
