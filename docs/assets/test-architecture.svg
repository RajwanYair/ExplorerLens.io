  <text x="740" y="95" text-anchor="middle" fill="#8b949e" font-size="10">5 benchmarks · P50/P95/P99 baselines</text>
  <rect x="615" y="108" width="250" height="26" rx="4" fill="#161b22"/>
  <text x="740" y="125" text-anchor="middle" fill="#c9d1d9" font-size="10">ThroughputBenchmarks.cpp</text>
