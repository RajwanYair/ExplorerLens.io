  <text x="740" y="255" text-anchor="middle" fill="#c9d1d9" font-size="10">FuzzFormatDetection / FuzzArchive / FuzzExif</text>
  <text x="740" y="282" text-anchor="middle" fill="#7d8590" font-size="9">data/corpus/malformed/ for crash testing</text>
