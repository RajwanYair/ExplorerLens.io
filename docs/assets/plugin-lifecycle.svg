<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" width="960" height="520">
  <title>ExplorerLens Plugin Lifecycle</title>
  <desc>Plugin lifecycle: discovery, trust verification, sandbox creation, execution, and teardown.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#58a6ff">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#3fb950">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#f85149">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#58a6ff" font-size="18" font-weight="700"
        font-family="'Segoe UI', system-ui, sans-serif">Plugin Lifecycle</text>
  <text x="480" y="54" text-anchor="middle" fill="#8b949e" font-size="11"
        font-family="'Segoe UI', system-ui, sans-serif">Discovery → Trust → Sandbox → Execute → Teardown</text>

  <!-- ═══ Phase 1: Discovery ═══ -->
  <rect x="30" y="80" width="160" height="110" rx="10" fill="#21262d" stroke="#58a6ff" stroke-width="2"/>
  <text x="110" y="105" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="700"
        font-family="'Segoe UI', system-ui, sans-serif">1. Discovery</text>
  <text x="110" y="125" text-anchor="middle" fill="#c9d1d9" font-size="10"
        font-family="'Segoe UI', system-ui, sans-serif">Scan plugin directories</text>
  <text x="110" y="140" text-anchor="middle" fill="#8b949e" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">%APPDATA%\ExplorerLens\</text>
  <text x="110" y="155" text-anchor="middle" fill="#8b949e" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">plugins\*.dll</text>
  <text x="110" y="172" text-anchor="middle" fill="#d29922" font-size="9" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">Load plugin_api.h exports</text>

  <!-- Arrow 1→2 -->
  <line x1="190" y1="135" x2="228" y2="135" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══ Phase 2: Trust Verification ═══ -->
  <rect x="230" y="80" width="180" height="110" rx="10" fill="#21262d" stroke="#d29922" stroke-width="2"/>
  <text x="320" y="105" text-anchor="middle" fill="#d29922" font-size="14" font-weight="700"
        font-family="'Segoe UI', system-ui, sans-serif">2. Trust Chain</text>
  <text x="320" y="125" text-anchor="middle" fill="#c9d1d9" font-size="10"
        font-family="'Segoe UI', system-ui, sans-serif">Authenticode signature</text>
  <text x="320" y="140" text-anchor="middle" fill="#8b949e" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">SHA-256 hash verification</text>
  <text x="320" y="155" text-anchor="middle" fill="#8b949e" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">ABI version compat check</text>
  <text x="320" y="172" text-anchor="middle" fill="#8b949e" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">Allowlist / blocklist match</text>

  <!-- Arrow 2→3 (pass) -->
  <line x1="410" y1="120" x2="448" y2="120" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="429" y="113" text-anchor="middle" fill="#3fb950" font-size="9" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">PASS</text>

  <!-- Arrow 2→reject (fail) -->
  <line x1="320" y1="190" x2="320" y2="225" stroke="#f85149" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <rect x="260" y="228" width="120" height="32" rx="6" fill="#21262d" stroke="#f85149" stroke-width="1.5"/>
  <text x="320" y="249" text-anchor="middle" fill="#f85149" font-size="11" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">REJECT + Log</text>

  <!-- ═══ Phase 3: Sandbox Creation ═══ -->
  <rect x="450" y="80" width="170" height="110" rx="10" fill="#21262d" stroke="#bc8cff" stroke-width="2"/>
  <text x="535" y="105" text-anchor="middle" fill="#bc8cff" font-size="14" font-weight="700"
        font-family="'Segoe UI', system-ui, sans-serif">3. Sandbox</text>
  <text x="535" y="125" text-anchor="middle" fill="#c9d1d9" font-size="10"
        font-family="'Segoe UI', system-ui, sans-serif">Restricted token (Job Object)</text>
  <text x="535" y="140" text-anchor="middle" fill="#8b949e" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">Memory limit: 256 MB</text>
  <text x="535" y="155" text-anchor="middle" fill="#8b949e" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">Timeout: 5 sec per decode</text>
  <text x="535" y="172" text-anchor="middle" fill="#8b949e" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">No network / registry access</text>

  <!-- Arrow 3→4 -->
  <line x1="620" y1="135" x2="658" y2="135" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══ Phase 4: Execution ═══ -->
  <rect x="660" y="80" width="170" height="110" rx="10" fill="#21262d" stroke="#3fb950" stroke-width="2"/>
  <text x="745" y="105" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="700"
        font-family="'Segoe UI', system-ui, sans-serif">4. Execute</text>
  <text x="745" y="125" text-anchor="middle" fill="#c9d1d9" font-size="10"
        font-family="'Segoe UI', system-ui, sans-serif">Call ProbeHeader()</text>
  <text x="745" y="140" text-anchor="middle" fill="#8b949e" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">→ format match? DecodeAtSize()</text>
  <text x="745" y="155" text-anchor="middle" fill="#8b949e" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">Returns HBITMAP to host</text>
  <text x="745" y="172" text-anchor="middle" fill="#8b949e" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">ETW telemetry per call</text>

  <!-- Arrow 4→5 -->
  <line x1="830" y1="135" x2="868" y2="135" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══ Phase 5: Teardown ═══ -->
  <rect x="870" y="90" width="70" height="90" rx="10" fill="#21262d" stroke="#8b949e" stroke-width="1.5"/>
  <text x="905" y="125" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="700"
        font-family="'Segoe UI', system-ui, sans-serif">5.</text>
  <text x="905" y="142" text-anchor="middle" fill="#8b949e" font-size="10"
        font-family="'Segoe UI', system-ui, sans-serif">Unload</text>
  <text x="905" y="158" text-anchor="middle" fill="#8b949e" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">Free DLL</text>

  <!-- ═══ Plugin SDK Section ═══ -->
  <rect x="30" y="290" width="900" height="90" rx="10" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="480" y="314" text-anchor="middle" fill="#c9d1d9" font-size="14" font-weight="700"
        font-family="'Segoe UI', system-ui, sans-serif">Plugin SDK — C ABI (SDK/plugin_api.h)</text>

  <rect x="50" y="326" width="160" height="38" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1"/>
  <text x="130" y="350" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">lens_plugin_info()</text>

  <rect x="230" y="326" width="160" height="38" rx="6" fill="#161b22" stroke="#d29922" stroke-width="1"/>
  <text x="310" y="350" text-anchor="middle" fill="#d29922" font-size="10" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">lens_probe_header()</text>

  <rect x="410" y="326" width="160" height="38" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="490" y="350" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">lens_decode_at_size()</text>

  <rect x="590" y="326" width="160" height="38" rx="6" fill="#161b22" stroke="#bc8cff" stroke-width="1"/>
  <text x="670" y="350" text-anchor="middle" fill="#bc8cff" font-size="10" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">lens_cleanup()</text>

  <rect x="770" y="326" width="140" height="38" rx="6" fill="#161b22" stroke="#8b949e" stroke-width="1"/>
  <text x="840" y="350" text-anchor="middle" fill="#8b949e" font-size="10" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">lens_get_caps()</text>

  <!-- ═══ Trust & Compat Section ═══ -->
  <rect x="30" y="400" width="440" height="100" rx="10" fill="#21262d" stroke="#d29922" stroke-width="1.5"/>
  <text x="250" y="424" text-anchor="middle" fill="#d29922" font-size="13" font-weight="700"
        font-family="'Segoe UI', system-ui, sans-serif">Trust &amp; Compatibility</text>

  <rect x="50" y="436" width="120" height="46" rx="6" fill="#161b22" stroke="#d29922" stroke-width="1"/>
  <text x="110" y="456" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">Authenticode</text>
  <text x="110" y="472" text-anchor="middle" fill="#8b949e" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">WinVerifyTrust</text>

  <rect x="190" y="436" width="120" height="46" rx="6" fill="#161b22" stroke="#d29922" stroke-width="1"/>
  <text x="250" y="456" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">ABI Version</text>
  <text x="250" y="472" text-anchor="middle" fill="#8b949e" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">LENS_PLUGIN_ABI=1</text>

  <rect x="330" y="436" width="120" height="46" rx="6" fill="#161b22" stroke="#d29922" stroke-width="1"/>
  <text x="390" y="456" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">Compat Kit</text>
  <text x="390" y="472" text-anchor="middle" fill="#8b949e" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">Header-only tests</text>

  <!-- ═══ Error Handling ═══ -->
  <rect x="490" y="400" width="440" height="100" rx="10" fill="#21262d" stroke="#f85149" stroke-width="1.5"/>
  <text x="710" y="424" text-anchor="middle" fill="#f85149" font-size="13" font-weight="700"
        font-family="'Segoe UI', system-ui, sans-serif">Error Handling &amp; Telemetry</text>

  <rect x="510" y="436" width="120" height="46" rx="6" fill="#161b22" stroke="#f85149" stroke-width="1"/>
  <text x="570" y="456" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">Crash Isolation</text>
  <text x="570" y="472" text-anchor="middle" fill="#8b949e" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">SEH + Job Object</text>

  <rect x="650" y="436" width="120" height="46" rx="6" fill="#161b22" stroke="#f85149" stroke-width="1"/>
  <text x="710" y="456" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">Auto-Disable</text>
  <text x="710" y="472" text-anchor="middle" fill="#8b949e" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">3 failures → blocklist</text>

  <rect x="790" y="436" width="120" height="46" rx="6" fill="#161b22" stroke="#f85149" stroke-width="1"/>
  <text x="850" y="456" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">ETW Events</text>
  <text x="850" y="472" text-anchor="middle" fill="#8b949e" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">Structured logging</text>
</svg>
