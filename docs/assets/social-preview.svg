<!-- ExplorerLens.io — GitHub Social Preview (1280 × 640)
     Upload to: GitHub → Settings → Social preview → Upload an image
     Convert to PNG first: open in browser, right-click → Save image as (use Edge/Chrome)
     Or: inkscape -export-type=png -export-width=1280 social-preview.svg
     Last updated: v35.5.0 "Vega-V" — 2026-04-10
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
<defs>

  <!-- ── Gradients ── -->
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#060a10"/>
    <stop offset="55%"  stop-color="#0c1520"/>
    <stop offset="100%" stop-color="#0f1a28"/>
  </linearGradient>

  <radialGradient id="lensHalo" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#1a4a8a" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#060a10" stop-opacity="0"/>
  </radialGradient>

  <radialGradient id="pupilGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#60aaff" stop-opacity="0.7"/>
    <stop offset="60%"  stop-color="#2f81f7" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#2f81f7" stop-opacity="0"/>
  </radialGradient>

  <linearGradient id="divGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#2f81f7" stop-opacity="0"/>
    <stop offset="28%"  stop-color="#2f81f7" stop-opacity="0.85"/>
    <stop offset="72%"  stop-color="#8957e5" stop-opacity="0.85"/>
    <stop offset="100%" stop-color="#8957e5" stop-opacity="0"/>
  </linearGradient>

  <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#2f81f7"/>
    <stop offset="100%" stop-color="#8957e5"/>
  </linearGradient>

  <linearGradient id="accentV" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#2f81f7"/>
    <stop offset="100%" stop-color="#8957e5"/>
  </linearGradient>

  <linearGradient id="bottomFade" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#060a10" stop-opacity="0"/>
    <stop offset="100%" stop-color="#060a10" stop-opacity="0.7"/>
  </linearGradient>

  <!-- ── Filters ── -->
  <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
    <feGaussianBlur stdDeviation="9" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <filter id="sglow" x="-25%" y="-25%" width="150%" height="150%">
    <feGaussianBlur stdDeviation="4.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- ── Subtle dot grid ── -->
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.9" fill="#1e2e48" opacity="0.8"/>
  </pattern>

  <!-- ── Lens clip (inner content mask) ── -->
  <clipPath id="lensClip">
    <circle cx="282" cy="320" r="191"/>
  </clipPath>

</defs>

<!-- ══════════════════════════════════════
     BACKGROUND
══════════════════════════════════════ -->
<rect width="1280" height="640" fill="url(#bg)"/>
<rect width="1280" height="640" fill="url(#dots)"/>

<!-- Subtle left-side radial brightening around lens -->
<ellipse cx="282" cy="320" rx="310" ry="285" fill="url(#lensHalo)"/>

<!-- Bottom vignette -->
<rect x="0" y="480" width="1280" height="160" fill="url(#bottomFade)"/>


<!-- ══════════════════════════════════════
     LENS SYSTEM  (center: 282, 320)
══════════════════════════════════════ -->

<!-- Outermost orbit ring (dashed) -->
<circle cx="282" cy="320" r="232"
        fill="none" stroke="#1e3b60" stroke-width="1"
        stroke-dasharray="7 5" opacity="0.65"/>

<!-- 12 orbit tick marks at 30° intervals -->
<g transform="translate(282,320)">
  <g stroke="#2f81f7" stroke-width="2.5" opacity="0.6" stroke-linecap="round">
    <line x1="224" y1="0" x2="232" y2="0"/>
    <line x1="224" y1="0" x2="232" y2="0" transform="rotate(30)"/>
    <line x1="224" y1="0" x2="232" y2="0" transform="rotate(60)"/>
    <line x1="224" y1="0" x2="232" y2="0" transform="rotate(90)"/>
    <line x1="224" y1="0" x2="232" y2="0" transform="rotate(120)"/>
    <line x1="224" y1="0" x2="232" y2="0" transform="rotate(150)"/>
    <line x1="224" y1="0" x2="232" y2="0" transform="rotate(180)"/>
    <line x1="224" y1="0" x2="232" y2="0" transform="rotate(210)"/>
    <line x1="224" y1="0" x2="232" y2="0" transform="rotate(240)"/>
    <line x1="224" y1="0" x2="232" y2="0" transform="rotate(270)"/>
    <line x1="224" y1="0" x2="232" y2="0" transform="rotate(300)"/>
    <line x1="224" y1="0" x2="232" y2="0" transform="rotate(330)"/>
  </g>
</g>

<!-- Main lens ring (glowing blue) -->
<circle cx="282" cy="320" r="196"
        fill="none" stroke="#2f81f7" stroke-width="3"
        filter="url(#glow)" opacity="0.92"/>

<!-- Inner secondary ring (dashed) -->
<circle cx="282" cy="320" r="152"
        fill="none" stroke="#1d3f6b" stroke-width="1"
        stroke-dasharray="3 6" opacity="0.55"/>

<!-- Scan lines clipped inside lens -->
<g clip-path="url(#lensClip)" stroke="#1b3558" stroke-width="1" opacity="0.32">
  <line x1="90" y1="243" x2="474" y2="243"/>
  <line x1="90" y1="263" x2="474" y2="263"/>
  <line x1="90" y1="283" x2="474" y2="283"/>
  <line x1="90" y1="303" x2="474" y2="303"/>
  <line x1="90" y1="323" x2="474" y2="323"/>
  <line x1="90" y1="343" x2="474" y2="343"/>
  <line x1="90" y1="363" x2="474" y2="363"/>
  <line x1="90" y1="383" x2="474" y2="383"/>
  <line x1="90" y1="403" x2="474" y2="403"/>
</g>

<!-- Aperture blades (6 diagonals, 30° apart, through center) -->
<g transform="translate(282,320)" stroke="#1d3f6b" stroke-width="1.5" opacity="0.42">
  <line x1="-152" y1="0" x2="152" y2="0"/>
  <line x1="-152" y1="0" x2="152" y2="0" transform="rotate(30)"/>
  <line x1="-152" y1="0" x2="152" y2="0" transform="rotate(60)"/>
  <line x1="-152" y1="0" x2="152" y2="0" transform="rotate(90)"/>
  <line x1="-152" y1="0" x2="152" y2="0" transform="rotate(120)"/>
  <line x1="-152" y1="0" x2="152" y2="0" transform="rotate(150)"/>
</g>

<!-- Pupil glow fill -->
<circle cx="282" cy="320" r="75" fill="url(#pupilGlow)"/>

<!-- Pupil ring -->
<circle cx="282" cy="320" r="75"
        fill="none" stroke="#2f81f7" stroke-width="2.5"
        filter="url(#sglow)" opacity="0.9"/>

<!-- Crosshair (4 broken segments from center to main ring) -->
<g transform="translate(282,320)"
   stroke="#2f81f7" stroke-width="1.5" opacity="0.52" stroke-linecap="round">
  <line x1="-196" y1="0"   x2="-82"  y2="0"/>
  <line x1="82"   y1="0"   x2="196"  y2="0"/>
  <line x1="0"    y1="-196" x2="0"   y2="-82"/>
  <line x1="0"    y1="82"  x2="0"    y2="196"/>
</g>

<!-- Center pupil (dark fill + blue core + bright spec) -->
<circle cx="282" cy="320" r="33"
        fill="#090d13" stroke="#2f81f7" stroke-width="2.5"
        filter="url(#sglow)"/>
<circle cx="282" cy="320" r="18" fill="#2f81f7" filter="url(#sglow)"/>
<circle cx="282" cy="320" r="7"  fill="#a8d4ff" opacity="0.9"/>

<!-- Magnifying glass handle — exits bottom-right of lens ring -->
<!-- Lens edge at 47°: (282 + 196·cos47°, 320 + 196·sin47°) ≈ (416, 463) -->
<!-- Handle tip 78px further in same direction ≈ (469, 520) -->
<line x1="413" y1="460" x2="469" y2="520"
      stroke="url(#accentV)" stroke-width="15" stroke-linecap="round" opacity="0.88"/>
<line x1="413" y1="460" x2="469" y2="520"
      stroke="#c0dcff" stroke-width="3.5" stroke-linecap="round" opacity="0.45"/>


<!-- ══════════════════════════════════════
     FORMAT PILLS (bottom of left section)
══════════════════════════════════════ -->
<text x="282" y="578"
      font-family="'Courier New', Courier, monospace"
      font-size="17" fill="#2d4a6a"
      text-anchor="middle" letter-spacing="4">
  .PDF  .AVIF  .HEIC  .JXL  .WebP  .RAW  .PSD
</text>


<!-- ══════════════════════════════════════
     VERTICAL DIVIDER
══════════════════════════════════════ -->
<rect x="557" y="0" width="2" height="640" fill="url(#divGrad)"/>


<!-- ══════════════════════════════════════
     RIGHT SECTION
══════════════════════════════════════ -->

<!-- Top accent bar -->
<rect x="592" y="88" width="62" height="4" rx="2" fill="url(#accent)"/>

<!-- Main product name: ExplorerLens.io -->
<text x="592" y="192"
      font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif"
      font-size="84" font-weight="700" letter-spacing="-2">
  <tspan fill="#f0f6fc">ExplorerLens</tspan><tspan fill="#2f81f7">.io</tspan>
</text>

<!-- Tagline -->
<text x="594" y="242"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="25" fill="#8b949e" letter-spacing="0.2">
  GPU-Accelerated Thumbnails  ·  Windows + macOS + Linux  ·  C++20  ·  MSVC v145  ·  v35.4.0 Vega-U
</text>

<!-- Horizontal rule -->
<rect x="592" y="268" width="656" height="1" fill="#21262d"/>


<!-- ── Stat chips ── -->

<!-- Chip 1 — FILE FORMATS / 200+ -->
<rect x="592" y="285" width="194" height="72" rx="8"
      fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
<text x="610" y="311"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="12" fill="#8b949e" letter-spacing="1.5">FILE FORMATS</text>
<text x="610" y="346"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="32" font-weight="700" fill="#2f81f7">200+</text>

<!-- Chip 2 — DECODERS / 25 -->
<rect x="802" y="285" width="194" height="72" rx="8"
      fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
<text x="820" y="311"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="12" fill="#8b949e" letter-spacing="1.5">DECODERS</text>
<text x="820" y="346"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="32" font-weight="700" fill="#8957e5">25</text>

<!-- Chip 3 — PER THUMBNAIL / 17ms -->
<rect x="1012" y="285" width="232" height="72" rx="8"
      fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
<text x="1030" y="311"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="12" fill="#8b949e" letter-spacing="1.5">PER THUMBNAIL</text>
<text x="1030" y="346"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="32" font-weight="700" fill="#3fb950">17ms</text>


<!-- GPU stack row -->
<text x="594" y="404"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="20" fill="#c9d1d9">
  DirectX 11 / 12  ·  Vulkan  ·  COM IThumbnailProvider  ·  macOS Quick Look  ·  Linux Nautilus
</text>

<!-- Format sample row -->
<text x="594" y="444"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="17" fill="#484f58">
  .AVIF  .HEIC  .JXL  .WebP  .PDF  .RAW  .PSD  .7z  .CBR  .EPUB  .glTF  .STL  +190 more
</text>


<!-- ── Bottom separator ── -->
<rect x="592" y="470" width="656" height="1" fill="#21262d"/>


<!-- ── Status badges ── -->

<!-- Tests passed -->
<rect x="592" y="487" width="138" height="36" rx="7"
      fill="#0c1e10" stroke="#2ea043" stroke-width="1.5"/>
<text x="610" y="511"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="15" fill="#3fb950" font-weight="600">&#x2713;  4724 Tests</text>

<!-- Zero warnings -->
<rect x="746" y="487" width="144" height="36" rx="7"
      fill="#0a1a2e" stroke="#2f81f7" stroke-width="1.5"/>
<text x="764" y="511"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="15" fill="#58a6ff" font-weight="600">◉  0 Warnings</text>

<!-- Version -->
<rect x="906" y="487" width="180" height="36" rx="7"
      fill="#14101f" stroke="#8957e5" stroke-width="1.5"/>
<text x="922" y="511"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="15" fill="#c9d1d9">v35.5.0  "Vega-V"</text>

<!-- GitHub URL (right-aligned) -->
<text x="1248" y="511"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="13" fill="#30363d" text-anchor="end">
  github.com/RajwanYair/ExplorerLens.io
</text>

</svg>
