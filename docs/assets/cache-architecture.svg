<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="960" height="480">
  <title>ExplorerLens Cache Architecture</title>
  <desc>Multi-tier cache architecture: L1 in-memory LRU, L2 on-disk SQLite, invalidation flow from file system watcher, and adaptive budget controller.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#58a6ff">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#3fb950">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#f85149">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="480" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#58a6ff" font-size="18" font-weight="700"
        font-family="'Segoe UI', system-ui, sans-serif">Cache Architecture</text>
  <text x="480" y="54" text-anchor="middle" fill="#8b949e" font-size="11"
        font-family="'Segoe UI', system-ui, sans-serif">L1 Memory → L2 Disk → Invalidation → Adaptive Budget</text>

  <!-- ═══ Thumbnail Request (entry point) ═══ -->
  <rect x="30" y="90" width="160" height="56" rx="8" fill="#21262d" stroke="#58a6ff" stroke-width="2"/>
  <text x="110" y="114" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">Thumbnail Request</text>
  <text x="110" y="133" text-anchor="middle" fill="#8b949e" font-size="10"
        font-family="'Segoe UI', system-ui, sans-serif">IThumbnailProvider</text>

  <!-- Arrow → L1 -->
  <line x1="190" y1="118" x2="248" y2="118" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══ L1 Cache (Memory LRU) ═══ -->
  <rect x="250" y="75" width="200" height="86" rx="10" fill="#21262d" stroke="#3fb950" stroke-width="2"/>
  <text x="350" y="98" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="700"
        font-family="'Segoe UI', system-ui, sans-serif">L1 — Memory LRU</text>
  <text x="350" y="116" text-anchor="middle" fill="#c9d1d9" font-size="10"
        font-family="'Segoe UI', system-ui, sans-serif">HBITMAP cache · &lt;5ms hit</text>
  <text x="350" y="132" text-anchor="middle" fill="#8b949e" font-size="10"
        font-family="'Segoe UI', system-ui, sans-serif">Budget: 64–256 MB (adaptive)</text>
  <text x="350" y="148" text-anchor="middle" fill="#8b949e" font-size="10"
        font-family="'Segoe UI', system-ui, sans-serif">Eviction: LRU + size-weighted</text>

  <!-- HIT label (upward) -->
  <text x="350" y="72" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">⚡ CACHE HIT → return HBITMAP</text>

  <!-- Arrow L1 MISS → L2 -->
  <line x1="450" y1="118" x2="508" y2="118" stroke="#d29922" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="479" y="110" text-anchor="middle" fill="#d29922" font-size="9" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">MISS</text>

  <!-- ═══ L2 Cache (Disk SQLite) ═══ -->
  <rect x="510" y="75" width="200" height="86" rx="10" fill="#21262d" stroke="#d29922" stroke-width="2"/>
  <text x="610" y="98" text-anchor="middle" fill="#d29922" font-size="14" font-weight="700"
        font-family="'Segoe UI', system-ui, sans-serif">L2 — Disk (SQLite)</text>
  <text x="610" y="116" text-anchor="middle" fill="#c9d1d9" font-size="10"
        font-family="'Segoe UI', system-ui, sans-serif">PNG blob cache · ~15ms hit</text>
  <text x="610" y="132" text-anchor="middle" fill="#8b949e" font-size="10"
        font-family="'Segoe UI', system-ui, sans-serif">Budget: 512 MB – 2 GB</text>
  <text x="610" y="148" text-anchor="middle" fill="#8b949e" font-size="10"
        font-family="'Segoe UI', system-ui, sans-serif">Key: path + mtime + size hash</text>

  <!-- Arrow L2 MISS → Decode -->
  <line x1="710" y1="118" x2="768" y2="118" stroke="#f85149" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="739" y="110" text-anchor="middle" fill="#f85149" font-size="9" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">MISS</text>

  <!-- ═══ Full Decode ═══ -->
  <rect x="770" y="80" width="160" height="76" rx="10" fill="#21262d" stroke="#f85149" stroke-width="2"/>
  <text x="850" y="103" text-anchor="middle" fill="#f85149" font-size="14" font-weight="700"
        font-family="'Segoe UI', system-ui, sans-serif">Full Decode</text>
  <text x="850" y="121" text-anchor="middle" fill="#c9d1d9" font-size="10"
        font-family="'Segoe UI', system-ui, sans-serif">Decoder pipeline · ~17ms</text>
  <text x="850" y="137" text-anchor="middle" fill="#8b949e" font-size="10"
        font-family="'Segoe UI', system-ui, sans-serif">ProbeHeader → DecodeAtSize</text>

  <!-- Arrow Decode → store back to L1 + L2 -->
  <line x1="850" y1="156" x2="850" y2="195" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="880" y="180" fill="#3fb950" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">Store</text>

  <!-- ═══ Write-back row ═══ -->
  <rect x="250" y="195" width="680" height="40" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="590" y="220" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">Write-back: decoded thumbnail → L1 (HBITMAP) + L2 (PNG blob) simultaneously</text>

  <!-- ═══ Invalidation Section ═══ -->
  <rect x="30" y="260" width="440" height="100" rx="10" fill="#21262d" stroke="#f85149" stroke-width="1.5"/>
  <text x="250" y="284" text-anchor="middle" fill="#f85149" font-size="14" font-weight="700"
        font-family="'Segoe UI', system-ui, sans-serif">Cache Invalidation</text>

  <!-- File watcher -->
  <rect x="50" y="296" width="130" height="46" rx="6" fill="#161b22" stroke="#f85149" stroke-width="1"/>
  <text x="115" y="316" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">File Watcher</text>
  <text x="115" y="332" text-anchor="middle" fill="#8b949e" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">ReadDirectoryChanges</text>

  <!-- mtime check -->
  <rect x="200" y="296" width="120" height="46" rx="6" fill="#161b22" stroke="#d29922" stroke-width="1"/>
  <text x="260" y="316" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">mtime Check</text>
  <text x="260" y="332" text-anchor="middle" fill="#8b949e" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">On L2 cache hit</text>

  <!-- TTL eviction -->
  <rect x="340" y="296" width="110" height="46" rx="6" fill="#161b22" stroke="#d29922" stroke-width="1"/>
  <text x="395" y="316" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">TTL Eviction</text>
  <text x="395" y="332" text-anchor="middle" fill="#8b949e" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">Max age: 7 days</text>

  <!-- ═══ Adaptive Budget Controller ═══ -->
  <rect x="500" y="260" width="430" height="100" rx="10" fill="#21262d" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="715" y="284" text-anchor="middle" fill="#bc8cff" font-size="14" font-weight="700"
        font-family="'Segoe UI', system-ui, sans-serif">Adaptive Budget Controller</text>

  <rect x="520" y="296" width="120" height="46" rx="6" fill="#161b22" stroke="#bc8cff" stroke-width="1"/>
  <text x="580" y="316" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">Memory Pressure</text>
  <text x="580" y="332" text-anchor="middle" fill="#8b949e" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">GlobalMemoryStatusEx</text>

  <rect x="660" y="296" width="120" height="46" rx="6" fill="#161b22" stroke="#bc8cff" stroke-width="1"/>
  <text x="720" y="316" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">Hit Rate Monitor</text>
  <text x="720" y="332" text-anchor="middle" fill="#8b949e" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">Expand if &gt;80% hits</text>

  <rect x="800" y="296" width="110" height="46" rx="6" fill="#161b22" stroke="#bc8cff" stroke-width="1"/>
  <text x="855" y="316" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="600"
        font-family="'Segoe UI', system-ui, sans-serif">Disk Budget</text>
  <text x="855" y="332" text-anchor="middle" fill="#8b949e" font-size="9"
        font-family="'Segoe UI', system-ui, sans-serif">Shrink if &lt;10% free</text>

  <!-- ═══ Performance Targets ═══ -->
  <rect x="30" y="385" width="900" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="480" y="408" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="700"
        font-family="'Segoe UI', system-ui, sans-serif">Performance Targets</text>

  <text x="150" y="435" text-anchor="middle" fill="#3fb950" font-size="22" font-weight="700"
        font-family="'Segoe UI', system-ui, sans-serif">&lt;5ms</text>
  <text x="150" y="448" text-anchor="middle" fill="#8b949e" font-size="10"
        font-family="'Segoe UI', system-ui, sans-serif">L1 cache hit</text>

  <text x="380" y="435" text-anchor="middle" fill="#d29922" font-size="22" font-weight="700"
        font-family="'Segoe UI', system-ui, sans-serif">~15ms</text>
  <text x="380" y="448" text-anchor="middle" fill="#8b949e" font-size="10"
        font-family="'Segoe UI', system-ui, sans-serif">L2 cache hit</text>

  <text x="590" y="435" text-anchor="middle" fill="#f85149" font-size="22" font-weight="700"
        font-family="'Segoe UI', system-ui, sans-serif">~17ms</text>
  <text x="590" y="448" text-anchor="middle" fill="#8b949e" font-size="10"
        font-family="'Segoe UI', system-ui, sans-serif">Cold decode (single)</text>

  <text x="810" y="435" text-anchor="middle" fill="#bc8cff" font-size="22" font-weight="700"
        font-family="'Segoe UI', system-ui, sans-serif">235/s</text>
  <text x="810" y="448" text-anchor="middle" fill="#8b949e" font-size="10"
        font-family="'Segoe UI', system-ui, sans-serif">Batch throughput</text>
</svg>
