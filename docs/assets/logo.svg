<!-- ExplorerLens.io — Square Logo / Icon  (512 × 512)
     Use as: GitHub repository social icon, MSIX app icon source, favicon source.
     Export to PNG: open in browser or inkscape --export-type=png --export-width=512 logo.svg
     Last updated: v15.3.0 "Zenith-T" — 2026-03-25
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
<defs>

  <radialGradient id="bgr" cx="50%" cy="45%" r="55%">
    <stop offset="0%"   stop-color="#0f1e35"/>
    <stop offset="100%" stop-color="#060a10"/>
  </radialGradient>

  <radialGradient id="halo" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#1a4a8a" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#060a10" stop-opacity="0"/>
  </radialGradient>

  <radialGradient id="pupil" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#70baff" stop-opacity="0.85"/>
    <stop offset="55%"  stop-color="#2f81f7" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#2f81f7" stop-opacity="0"/>
  </radialGradient>

  <linearGradient id="handle" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#2f81f7"/>
    <stop offset="100%" stop-color="#8957e5"/>
  </linearGradient>

  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="7" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <filter id="sglow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="3.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.7" fill="#1e2e48" opacity="0.7"/>
  </pattern>

  <clipPath id="lc">
    <circle cx="213" cy="213" r="158"/>
  </clipPath>

</defs>

<!-- ── Background ── -->
<rect width="512" height="512" fill="url(#bgr)"/>
<rect width="512" height="512" fill="url(#dots)"/>

<!-- ── Lens halo ── -->
<circle cx="213" cy="213" r="230" fill="url(#halo)"/>

<!-- ── Outer orbit ring ── -->
<circle cx="213" cy="213" r="196"
        fill="none" stroke="#1e3b60" stroke-width="1.2"
        stroke-dasharray="7 5" opacity="0.7"/>

<!-- 12 orbit tick marks -->
<g transform="translate(213,213)">
  <g stroke="#2f81f7" stroke-width="2.5" opacity="0.65" stroke-linecap="round">
    <line x1="188" y1="0" x2="196" y2="0"/>
    <line x1="188" y1="0" x2="196" y2="0" transform="rotate(30)"/>
    <line x1="188" y1="0" x2="196" y2="0" transform="rotate(60)"/>
    <line x1="188" y1="0" x2="196" y2="0" transform="rotate(90)"/>
    <line x1="188" y1="0" x2="196" y2="0" transform="rotate(120)"/>
    <line x1="188" y1="0" x2="196" y2="0" transform="rotate(150)"/>
    <line x1="188" y1="0" x2="196" y2="0" transform="rotate(180)"/>
    <line x1="188" y1="0" x2="196" y2="0" transform="rotate(210)"/>
    <line x1="188" y1="0" x2="196" y2="0" transform="rotate(240)"/>
    <line x1="188" y1="0" x2="196" y2="0" transform="rotate(270)"/>
    <line x1="188" y1="0" x2="196" y2="0" transform="rotate(300)"/>
    <line x1="188" y1="0" x2="196" y2="0" transform="rotate(330)"/>
  </g>
</g>

<!-- ── Main lens ring ── -->
<circle cx="213" cy="213" r="160"
        fill="none" stroke="#2f81f7" stroke-width="3.5"
        filter="url(#glow)" opacity="0.94"/>

<!-- ── Inner dashed ring ── -->
<circle cx="213" cy="213" r="122"
        fill="none" stroke="#1d3f6b" stroke-width="1"
        stroke-dasharray="3 6" opacity="0.55"/>

<!-- ── Scan lines (clipped inside lens) ── -->
<g clip-path="url(#lc)" stroke="#1b3558" stroke-width="0.9" opacity="0.3">
  <line x1="55"  y1="170" x2="371" y2="170"/>
  <line x1="55"  y1="190" x2="371" y2="190"/>
  <line x1="55"  y1="210" x2="371" y2="210"/>
  <line x1="55"  y1="230" x2="371" y2="230"/>
  <line x1="55"  y1="250" x2="371" y2="250"/>
  <line x1="55"  y1="270" x2="371" y2="270"/>
</g>

<!-- ── Aperture blades (6 diagonals) ── -->
<g transform="translate(213,213)" stroke="#1d3f6b" stroke-width="1.5" opacity="0.4">
  <line x1="-122" y1="0" x2="122" y2="0"/>
  <line x1="-122" y1="0" x2="122" y2="0" transform="rotate(30)"/>
  <line x1="-122" y1="0" x2="122" y2="0" transform="rotate(60)"/>
  <line x1="-122" y1="0" x2="122" y2="0" transform="rotate(90)"/>
  <line x1="-122" y1="0" x2="122" y2="0" transform="rotate(120)"/>
  <line x1="-122" y1="0" x2="122" y2="0" transform="rotate(150)"/>
</g>

<!-- ── Pupil glow + ring ── -->
<circle cx="213" cy="213" r="60" fill="url(#pupil)"/>
<circle cx="213" cy="213" r="60"
        fill="none" stroke="#2f81f7" stroke-width="2.5"
        filter="url(#sglow)" opacity="0.92"/>

<!-- ── Crosshair (4 broken segments) ── -->
<g transform="translate(213,213)"
   stroke="#2f81f7" stroke-width="1.5" opacity="0.5" stroke-linecap="round">
  <line x1="-160" y1="0"   x2="-66"  y2="0"/>
  <line x1="66"   y1="0"   x2="160"  y2="0"/>
  <line x1="0"    y1="-160" x2="0"   y2="-66"/>
  <line x1="0"    y1="66"  x2="0"    y2="160"/>
</g>

<!-- ── Center pupil ── -->
<circle cx="213" cy="213" r="27"
        fill="#060a10" stroke="#2f81f7" stroke-width="2.5"
        filter="url(#sglow)"/>
<circle cx="213" cy="213" r="15" fill="#2f81f7" filter="url(#sglow)"/>
<circle cx="213" cy="213" r="6"  fill="#a8d4ff" opacity="0.92"/>

<!-- ── Magnifying glass handle ── -->
<!-- Lens edge at 47°: (213 + 160·cos47°, 213 + 160·sin47°) ≈ (322, 330) -->
<!-- Handle tip ~65px further: (322+44, 330+48) = (366, 378) — adjusted to fit canvas -->
<line x1="319" y1="326" x2="374" y2="384"
      stroke="url(#handle)" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
<line x1="319" y1="326" x2="374" y2="384"
      stroke="#c0dcff" stroke-width="3" stroke-linecap="round" opacity="0.45"/>

<!-- ── "EL" wordmark below lens ── -->
<text x="256" y="470"
      font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif"
      font-size="36" font-weight="700" text-anchor="middle" letter-spacing="2">
  <tspan fill="#c9d1d9">Explorer</tspan><tspan fill="#2f81f7">Lens</tspan>
</text>

</svg>
