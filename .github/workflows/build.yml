# build.yml — GitHub Actions CI workflow for ExplorerLens Engine
# Copyright (c) 2026 ExplorerLens Project
#
# Canonical CI workflow: triggers on push to main and pull requests.
# Builds x64 Release with MSVC (via ilammy/msvc-dev-cmd), runs CTest, uploads artifacts.
# NOTE: build-and-test.yml was removed (superseded by this + ci-matrix.yml).

name: Build ExplorerLens Engine

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  VCPKG_DISABLE_METRICS: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build x64 Release
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      # ── Cache external/ to speed up builds ────────────────────
      - name: Cache external libraries
        uses: actions/cache@v4
        with:
          path: external/
          key: external-libs-${{ hashFiles('build-scripts/external-libs/**') }}
          restore-keys: |
            external-libs-

      # ── Setup MSVC developer command prompt ───────────────────
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── Verify toolchain ─────────────────────────────────────
      - name: Verify compiler
        shell: pwsh
        run: |
          cl.exe 2>&1 | Select-Object -First 3
          cmake --version | Select-Object -First 1
          ninja --version

      # ── CMake configure + build (ci-release preset) ───────────
      # ci-release: no hardcoded local paths, uses cl.exe from vcvars env
      - name: Configure
        shell: pwsh
        run: cmake --preset ci-release

      - name: Build
        shell: pwsh
        run: cmake --build --preset ci-release -j $env:NUMBER_OF_PROCESSORS

      # ── Run tests ────────────────────────────────────────────
      - name: Run tests (CTest)
        shell: pwsh
        run: ctest --test-dir build -C Release --output-on-failure -j 4

      # ── Upload test results ──────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-x64-release
          path: |
            build/Testing/**/*.xml
            build-logs/test-*.log
          retention-days: 30

      # ── Upload build artifacts ───────────────────────────────
      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-x64-release
          path: |
            build/bin/*.exe
            build/lib/*.lib
          retention-days: 14

