# build.yml — Manual / scheduled verification build for ExplorerLens Engine
# Copyright (c) 2026 ExplorerLens Project
#
# NOTE: ci-matrix.yml is the canonical PR/push CI for ExplorerLens.
# This workflow is reserved for manual on-demand verification and weekly
# scheduled health checks only. Do NOT add push/pull_request triggers here.

name: Build ExplorerLens Engine (Manual)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual build trigger'
        required: false
        default: 'Manual verification build'
  schedule:
    - cron: '0 3 * * 0'  # Weekly Sunday 03:00 UTC

permissions:
  contents: read

env:
  BUILD_TYPE: Release
  VCPKG_DISABLE_METRICS: 1
  # Opt into Node.js 24 for all actions (avoids Node 20 deprecation warnings)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build x64 Release
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      GIT_CONFIG_COUNT: 1
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: "*"

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      # ── Cache external/ to speed up builds ────────────────────
      - name: Cache external libraries
        uses: actions/cache@v4
        with:
          path: external/
          key: external-libs-${{ hashFiles('build-scripts/external-libs/**') }}
          restore-keys: |
            external-libs-

      # ── Setup MSVC developer command prompt ───────────────────
      # No toolset pin: auto-selects latest VS on runner (currently v143/VS2022).
      # When GitHub provides VS 2026 runners, this auto-upgrades to v145.
      - name: Setup MSVC (latest available)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── sccache — compiler cache for faster rebuilds ─────────
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Configure sccache environment
        shell: pwsh
        run: |
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $env:GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $env:GITHUB_ENV
          echo "SCCACHE_GHA_ENABLED=true" >> $env:GITHUB_ENV

      # ── Build external libraries from source (cache miss path) ──────────────
      # Never commit pre-built .lib files — they corrupt across MSVC versions.
      # Source trees live in external/; this action builds only what's missing.
      - name: Build external libraries
        uses: ./.github/actions/build-external-libs

      # ── Ensure Ninja is on PATH ───────────────────────────────
      - name: Verify build tools
        shell: pwsh
        run: |
          # Ninja ships with CMake on GitHub runners; also in VS BuildTools
          $ninja = Get-Command ninja -ErrorAction SilentlyContinue
          if (-not $ninja) {
            Write-Host "Ninja not on PATH — installing via choco" -ForegroundColor Yellow
            choco install ninja --no-progress -y 2>$null
          }
          cl.exe 2>&1 | Select-Object -First 1
          cmake --version | Select-Object -First 1
          ninja --version

      # ── CMake configure + build (ci-release preset) ───────────
      # ci-release: no hardcoded local paths, uses cl.exe from vcvars env
      - name: Configure
        shell: pwsh
        run: |
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          cmake --preset ci-release
          $sw.Stop()
          Write-Host "::notice::Configure took $($sw.Elapsed.TotalSeconds.ToString('F1'))s"

      - name: Build
        shell: pwsh
        run: |
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          cmake --build --preset ci-release -j $env:NUMBER_OF_PROCESSORS
          $sw.Stop()
          Write-Host "::notice::Build took $($sw.Elapsed.TotalSeconds.ToString('F1'))s"

      # ── Run tests ────────────────────────────────────────────
      - name: Run tests (CTest)
        shell: pwsh
        run: |
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          ctest --test-dir build -C Release --output-on-failure -j 4
          $sw.Stop()
          Write-Host "::notice::Tests took $($sw.Elapsed.TotalSeconds.ToString('F1'))s"

      # ── Upload test results ──────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-x64-release
          path: |
            build/Testing/**/*.xml
            build-logs/test-*.log
          retention-days: 30

      # ── Upload build artifacts ───────────────────────────────
      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-x64-release
          path: |
            build/bin/*.exe
            build/lib/*.lib
          retention-days: 14
