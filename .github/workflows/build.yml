# build.yml — GitHub Actions CI workflow for ExplorerLens Engine
# Copyright (c) 2026 ExplorerLens Project
#
# Triggers on push to main and pull requests.
# Builds x64 Release with MSVC, runs tests, uploads artifacts.

name: Build ExplorerLens Engine

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  VCPKG_DISABLE_METRICS: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build x64 Release
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      # ── Cache external/ to speed up builds ────────────────────
      - name: Cache external libraries
        uses: actions/cache@v4
        with:
          path: external/
          key: external-libs-${{ hashFiles('build-scripts/external-libs/**') }}
          restore-keys: |
            external-libs-

      # ── Setup MSVC developer command prompt ───────────────────
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── Verify toolchain ─────────────────────────────────────
      - name: Verify compiler
        shell: pwsh
        run: |
          cl.exe 2>&1 | Select-Object -First 3
          cmake --version | Select-Object -First 1
          ninja --version

      # ── CMake configure ──────────────────────────────────────
      - name: Configure (CMake preset default-release)
        shell: pwsh
        run: |
          cmake --preset default-release

      # ── Build ────────────────────────────────────────────────
      - name: Build
        shell: pwsh
        run: |
          cmake --build --preset default-release -j $env:NUMBER_OF_PROCESSORS

      # ── Run tests ────────────────────────────────────────────
      - name: Run tests (CTest)
        shell: pwsh
        run: |
          ctest --test-dir build -C Release --output-on-failure -j 4

      # ── Upload test results ──────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-x64-release
          path: |
            build/Testing/**/*.xml
            build-logs/test-*.log
          retention-days: 30

      # ── Upload build artifacts ───────────────────────────────
      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-x64-release
          path: |
            build/bin/*.exe
            build/lib/*.lib
          retention-days: 14

