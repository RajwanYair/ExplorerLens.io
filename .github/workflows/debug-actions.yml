# debug-actions.yml — Manual workflow to diagnose CI failures
#
# USE WHEN:  A workflow failed and you need full diagnostic information.
# TRIGGER:   workflow_dispatch only — never runs automatically.
#
# Gathers: MSVC environment, CMake version tree, external lib inventory,
# build system paths, git state, and optionally runs a test build with
# maximum verbosity. Results are uploaded as a downloadable artifact.

name: Debug CI Environment

on:
  workflow_dispatch:
    inputs:
      run_build:
        description: "Run a test build (slow — ~15 min)"
        type: boolean
        default: false
      build_preset:
        description: "CMake preset to test"
        type: choice
        options:
          - ci-release
          - ci-debug
          - default-release
        default: ci-release
      verbose_ninja:
        description: "Extra verbose ninja output (-v)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  diagnose:
    name: Diagnose CI environment
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout (full)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Setup MSVC (same as production workflows) ──────────────────────────
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      # ── 1. Runner Hardware & OS ────────────────────────────────────────────
      - name: "Diag: Runner info"
        shell: pwsh
        run: |
          Write-Host "=== RUNNER HARDWARE ===" -ForegroundColor Cyan
          Get-ComputerInfo | Select-Object CsName, CsProcessors, CsPhyicallyInstalledMemory,
            OsName, OsVersion, OsArchitecture | Format-List
          Write-Host ""
          Write-Host "=== DISK SPACE ===" -ForegroundColor Cyan
          Get-PSDrive -PSProvider FileSystem | Select-Object Name, Used, Free | Format-Table

      # ── 2. Toolchain Versions ──────────────────────────────────────────────
      - name: "Diag: Toolchain versions"
        shell: pwsh
        run: |
          Write-Host "=== TOOLCHAIN ===" -ForegroundColor Cyan
          $tools = @(
            @{ cmd="cl.exe";          args="/?" },
            @{ cmd="link.exe";        args="/?" },
            @{ cmd="lib.exe";         args="/?" },
            @{ cmd="cmake";           args="--version" },
            @{ cmd="ninja";           args="--version" },
            @{ cmd="msbuild";         args="-version" },
            @{ cmd="git";             args="--version" },
            @{ cmd="python";          args="--version" },
            @{ cmd="wix";             args="--version" }
          )
          foreach ($t in $tools) {
            try {
              $out = & $t.cmd $t.args 2>&1 | Select-Object -First 2
              Write-Host "  $($t.cmd): $($out -join ' ')" -ForegroundColor Green
            } catch {
              Write-Host "  $($t.cmd): NOT FOUND" -ForegroundColor Red
            }
          }

      # ── 3. PATH & Environment ──────────────────────────────────────────────
      - name: "Diag: PATH and key env vars"
        shell: pwsh
        run: |
          Write-Host "=== PATH ENTRIES ===" -ForegroundColor Cyan
          $env:PATH -split ';' | ForEach-Object { Write-Host "  $_" }
          Write-Host ""
          Write-Host "=== KEY ENV VARS ===" -ForegroundColor Cyan
          @('VSINSTALLDIR','VCToolsVersion','INCLUDE','LIB','LIBPATH',
            'WindowsSdkDir','WindowsSDKVersion','VSCMD_VER',
            'GITHUB_REF','GITHUB_SHA','GITHUB_ACTOR','RUNNER_OS') |
          ForEach-Object { Write-Host "  ${_} = $([Environment]::GetEnvironmentVariable($_))" }

      # ── 4. External Library Inventory ─────────────────────────────────────
      - name: "Diag: External library state"
        shell: pwsh
        run: |
          Write-Host "=== EXPECTED EXTERNAL LIBS ===" -ForegroundColor Cyan
          $libs = @{
            "zlib"    = "external/compression-libs/zlib-1.3.1/install/lib/zlibstatic.lib"
            "zstd"    = "external/compression-libs/zstd-1.5.7/build-manual/zstd_static.lib"
            "minizip" = "external/compression-libs/minizip-ng-4.0.10/build-manual/minizip.lib"
            "libwebp" = "external/image-libs/libwebp-1.5.0-build/build-cmake/Release/libwebp.lib"
            "libraw"  = "external/camera-libs/libraw-install/lib/libraw_static.lib"
          }
          foreach ($name in $libs.Keys) {
            $path = $libs[$name]
            if (Test-Path $path) {
              $size = [int]((Get-Item $path).Length / 1KB)
              Write-Host "  [OK]  $name — $path ($size KB)" -ForegroundColor Green
            } else {
              Write-Host "  [MISSING]  $name — $path" -ForegroundColor Red
            }
          }
          Write-Host ""
          Write-Host "=== TRACKED FILES IN external/ ===" -ForegroundColor Cyan
          git ls-files external/ | Group-Object { Split-Path $_ -Parent } |
            Select-Object Name, Count | Format-Table

      # ── 5. CMake Preset Validation ─────────────────────────────────────────
      - name: "Diag: CMake presets"
        shell: pwsh
        run: |
          Write-Host "=== CMAKE PRESETS ===" -ForegroundColor Cyan
          cmake --list-presets=configure 2>&1
          Write-Host ""
          cmake --list-presets=build 2>&1
          Write-Host ""
          cmake --list-presets=test 2>&1

      # ── 6. Git State ──────────────────────────────────────────────────────
      - name: "Diag: Git state"
        shell: pwsh
        run: |
          Write-Host "=== GIT STATE ===" -ForegroundColor Cyan
          Write-Host "Branch/ref: $env:GITHUB_REF"
          Write-Host "Commit:     $env:GITHUB_SHA"
          git log --oneline -10
          Write-Host ""
          Write-Host "=== TRACKED BINARY FILES ===" -ForegroundColor Yellow
          git ls-files --eol | Where-Object { $_ -match "\.(lib|dll|exe|obj)$" }

      # ── 7. Optional Build Run ──────────────────────────────────────────────
      - name: Build external libraries
        if: inputs.run_build == true
        uses: ./.github/actions/build-external-libs

      - name: "Optional: Run test build"
        if: inputs.run_build == true
        shell: pwsh
        run: |
          $preset = "${{ inputs.build_preset }}"
          Write-Host "=== CMAKE CONFIGURE ($preset) ===" -ForegroundColor Yellow
          cmake --preset $preset 2>&1 | Tee-Object -FilePath configure.log
          Write-Host ""
          Write-Host "=== CMAKE BUILD ===" -ForegroundColor Yellow
          $ninjaArgs = if ("${{ inputs.verbose_ninja }}" -eq "true") { @("-v") } else { @() }
          cmake --build --preset $preset -j 4 $ninjaArgs 2>&1 | Tee-Object -FilePath build.log

      # ── 8. Collect and upload diagnostic report ───────────────────────────
      - name: Collect diagnostic report
        if: always()
        shell: pwsh
        run: |
          $report = "diagnostic-report-$($env:GITHUB_RUN_ID).txt"
          @(
            "ExplorerLens CI Diagnostic Report",
            "Run ID:   $env:GITHUB_RUN_ID",
            "Ref:      $env:GITHUB_REF",
            "SHA:      $env:GITHUB_SHA",
            "Date:     $(Get-Date -Format 'o')",
            "Runner:   $env:RUNNER_OS / $env:RUNNER_ARCH",
            "",
            "IMPORTANT: Download and review configure.log / build.log in this artifact",
            "for detailed error output when run_build=true."
          ) | Set-Content $report
          Get-Content $report

      - name: Upload diagnostic artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-${{ github.run_id }}
          path: |
            diagnostic-report-*.txt
            configure.log
            build.log
          if-no-files-found: ignore
          retention-days: 14
