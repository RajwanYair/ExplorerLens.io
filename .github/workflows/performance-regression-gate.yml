name: Performance Regression Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

# Regression thresholds (from .github/standards/performance-benchmarks.md):
#   +20% median latency   → warning (non-blocking)
#   -15% batch throughput → BLOCKS merge
#   +30% memory peak      → warning (non-blocking)

env:
  # Opt into Node.js 24 for all actions (avoids Node 20 deprecation warnings)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  performance-regression-check:
    name: Check Performance Regressions
    runs-on: windows-latest

    env:
      # Baselines from performance-benchmarks.md (v25.2.0 — Core Ultra 9 / RTX 4090 baseline)
      BASELINE_SINGLE_MS: '17'        # target median: <17ms (NPU-accelerated path)
      BASELINE_BATCH_IPS: '235'       # target batch: >235 img/sec (CPU path, >350 with NPU)
      THRESHOLD_LATENCY_PCT: '15'     # block if +15% over baseline (tightened from 20%)
      THRESHOLD_THROUGHPUT_PCT: '10'  # block if -10% under baseline (tightened from 15%)

    steps:
      - name: Configure git safe.directory
        shell: pwsh
        run: git config --global safe.directory '*'

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache external libraries
        uses: actions/cache@v4
        with:
          path: external/
          key: external-libs-${{ hashFiles('build-scripts/external-libs/**') }}
          restore-keys: |
            external-libs-

      - name: Build external libraries
        uses: ./.github/actions/build-external-libs
        continue-on-error: true  # Benchmark link may fail; non-blocking

      - name: Configure CMake (ci-release preset)
        shell: pwsh
        # EngineBenchmark uses the Engine's custom PerformanceProfiler, not google/benchmark.
        # No vcpkg toolchain needed — external libs are tracked in git.
        run: cmake --preset ci-release

      - name: Build Benchmark Target
        shell: pwsh
        run: cmake --build --preset ci-release --target EngineBenchmark -j $env:NUMBER_OF_PROCESSORS

      - name: Run Benchmarks
        shell: pwsh
        run: |
          $paths = @(
            "build\bin\Release\EngineBenchmark.exe",
            "build\Engine\Tests\Release\EngineBenchmark.exe",
            "build\bin\EngineBenchmark.exe"
          )
          $benchExe = $paths | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $benchExe) {
            Write-Host "::warning::EngineBenchmark.exe not found — skipping performance check"
            exit 0
          }
          New-Item -ItemType Directory -Force "$env:TEMP\perf" | Out-Null
          # EngineBenchmark uses custom PerformanceProfiler, not google/benchmark JSON.
          # Run it and capture output; JSON threshold check is skipped if no JSON produced.
          & $benchExe 2>&1 | Tee-Object -FilePath "$env:TEMP\perf\bench-output.txt"
          Copy-Item "$env:TEMP\perf\bench-output.txt" "build-logs\perf-results.txt" -Force -ErrorAction SilentlyContinue

      - name: Enforce Regression Thresholds
        shell: pwsh
        run: |
          $resultsPath = "$env:TEMP\perf\results.json"
          if (-not (Test-Path $resultsPath)) {
            Write-Host "::notice::Benchmark did not produce JSON output — threshold check skipped (custom profiler format)"
            exit 0
          }

          $results  = Get-Content $resultsPath -Raw | ConvertFrom-Json
          $failures = @()
          $warnings = @()

          foreach ($bench in $results.benchmarks) {
            $name = $bench.name

            # Check single-decode latency benchmarks (name contains "Single" or "Decode")
            if ($name -match 'Single|Decode' -and $bench.PSObject.Properties['real_time']) {
              $latencyMs = [double]$bench.real_time / 1e6  # nanoseconds → ms
              $maxAllowed = [double]$env:BASELINE_SINGLE_MS * (1 + [double]$env:THRESHOLD_LATENCY_PCT / 100)
              if ($latencyMs -gt $maxAllowed) {
                $failures += "LATENCY: $name = $([math]::Round($latencyMs,1))ms > threshold $([math]::Round($maxAllowed,1))ms (+$($env:THRESHOLD_LATENCY_PCT)%)"
              } elseif ($latencyMs -gt [double]$env:BASELINE_SINGLE_MS) {
                $warnings += "LATENCY WARNING: $name = $([math]::Round($latencyMs,1))ms (baseline: $($env:BASELINE_SINGLE_MS)ms)"
              }
            }

            # Check batch throughput benchmarks (name contains "Batch" or "Throughput")
            if ($name -match 'Batch|Throughput' -and $bench.PSObject.Properties['items_per_second']) {
              $ips = [double]$bench.items_per_second
              $minAllowed = [double]$env:BASELINE_BATCH_IPS * (1 - [double]$env:THRESHOLD_THROUGHPUT_PCT / 100)
              if ($ips -lt $minAllowed) {
                $failures += "THROUGHPUT: $name = $([math]::Round($ips,1)) img/s < threshold $([math]::Round($minAllowed,1)) img/s (-$($env:THRESHOLD_THROUGHPUT_PCT)%)"
              }
            }
          }

          # Emit warnings
          foreach ($w in $warnings) { Write-Host "::warning::$w" }

          # Emit failures (blocking)
          if ($failures.Count -gt 0) {
            Write-Host "::error::Performance regression detected — merge BLOCKED" -ForegroundColor Red
            foreach ($f in $failures) { Write-Host "::error::$f" }
            exit 1
          }

          Write-Host "Performance regression check PASSED" -ForegroundColor Green
          Write-Host "  Single-decode threshold: <$([double]$env:BASELINE_SINGLE_MS * (1 + [double]$env:THRESHOLD_LATENCY_PCT/100))ms"
          Write-Host "  Batch throughput threshold: >$([double]$env:BASELINE_BATCH_IPS * (1 - [double]$env:THRESHOLD_THROUGHPUT_PCT/100)) img/s"

      - name: Upload Benchmark Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-${{ github.run_number }}
          path: |
            build-logs/perf-results.txt
            build-logs/perf-results.json
          retention-days: 30

      - name: Compare Against Baseline (Sprint 27)
        shell: pwsh
        run: |
          $baselinePath = "Engine/Tests/benchmarks/baseline.json"
          $resultsPath  = "build-logs/perf-results.json"
          if (-not (Test-Path $baselinePath)) {
            Write-Host "::warning::baseline.json not found — skipping baseline comparison"
            exit 0
          }
          if (-not (Test-Path $resultsPath)) {
            Write-Host "::warning::perf-results.json not found — skipping baseline comparison"
            exit 0
          }

          $baseline = Get-Content $baselinePath -Raw | ConvertFrom-Json
          $results  = Get-Content $resultsPath  -Raw | ConvertFrom-Json

          $blockPct = [double]$baseline.thresholds.latency_block_pct
          $warnPct  = [double]$baseline.thresholds.latency_warn_pct
          $tputPct  = [double]$baseline.thresholds.throughput_block_pct

          $failures = @()
          $warnings = @()

          foreach ($baseEntry in $baseline.benchmarks) {
            $match = $results.benchmarks | Where-Object { $_.name -eq $baseEntry.name } | Select-Object -First 1
            if (-not $match) { continue }

            if ($baseEntry.category -eq "batch" -and $match.PSObject.Properties['items_per_second']) {
              $measured = [double]$match.items_per_second
              $floor    = [double]$baseEntry.throughput_ips * (1.0 - $tputPct / 100.0)
              if ($measured -lt $floor) {
                $failures += "THROUGHPUT REGRESSION: $($baseEntry.name) — $([math]::Round($measured,1)) img/s < baseline floor $([math]::Round($floor,1)) img/s"
              }
            }

            if ($baseEntry.PSObject.Properties['p50_ms'] -and $match.PSObject.Properties['real_time']) {
              $measured_ms = [double]$match.real_time / 1e6
              $warn_limit  = [double]$baseEntry.p50_ms * (1.0 + $warnPct  / 100.0)
              $block_limit = [double]$baseEntry.p50_ms * (1.0 + $blockPct / 100.0)
              if ($measured_ms -gt $block_limit) {
                $failures += "LATENCY REGRESSION: $($baseEntry.name) — $([math]::Round($measured_ms,2))ms > block limit $([math]::Round($block_limit,2))ms"
              } elseif ($measured_ms -gt $warn_limit) {
                $warnings += "LATENCY WARNING: $($baseEntry.name) — $([math]::Round($measured_ms,2))ms > warn limit $([math]::Round($warn_limit,2))ms"
              }
            }
          }

          foreach ($w in $warnings) { Write-Host "::warning::$w" }
          if ($failures.Count -gt 0) {
            foreach ($f in $failures) { Write-Host "::error::$f" }
            exit 1
          }
          Write-Host "Baseline comparison PASSED — no regressions detected" -ForegroundColor Green
