name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint Code
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format (pinned LLVM 18)
        shell: pwsh
        run: |
          # Use pre-installed clang-format if available (GitHub runner ships LLVM)
          if (Get-Command clang-format -ErrorAction SilentlyContinue) {
            Write-Host "clang-format already available: $(clang-format --version)"
          } else {
            choco install llvm --version=18.1.8 --no-progress -y 2>$null
            $env:PATH += ";C:\Program Files\LLVM\bin"
          }

      - name: Run clang-format check (non-blocking — warnings only)
        shell: pwsh
        run: |
          $clangFormat = Get-Command clang-format -ErrorAction SilentlyContinue
          if (-not $clangFormat) {
            Write-Host "::warning::clang-format not available — skipping format check"
            exit 0
          }

          $files = Get-ChildItem -Path LENSShell,LENSManager,Engine -Recurse -Include *.cpp,*.h -ErrorAction SilentlyContinue
          Write-Host "Found $($files.Count) C++ source files to check (clang-format $(clang-format --version))"

          $styleWarnings = 0
          foreach ($f in $files) {
            & clang-format --dry-run --Werror $f.FullName 2>&1 | Out-Null
            if ($LASTEXITCODE -ne 0) {
              $styleWarnings++
              Write-Host "::warning file=$($f.FullName)::Style deviation: $($f.Name) (run: clang-format -i $($f.Name))"
            }
          }
          if ($styleWarnings -gt 0) {
            Write-Host "::warning::$styleWarnings file(s) have style deviations — run clang-format -i to fix" -ForegroundColor Yellow
          } else {
            Write-Host "All $($files.Count) files match clang-format style" -ForegroundColor Green
          }
          # Non-blocking: style issues are warnings, not errors

  analyze:
    name: Static Analysis
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC (latest available on runner)
        # No toolset pin: auto-selects latest VS. Currently v143/VS2022 on GH runners.
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache external libraries
        uses: actions/cache@v4
        with:
          path: external/
          key: external-libs-${{ hashFiles('build-scripts/external-libs/**') }}
          restore-keys: |
            external-libs-

      - name: Build external libraries
        uses: ./.github/actions/build-external-libs

      - name: Configure CMake (ci-release preset)
        shell: pwsh
        run: cmake --preset ci-release

      - name: Build Engine with MSVC /analyze (zero-warning gate)
        shell: pwsh
        run: |
          Write-Host "Running MSVC static analysis on ExplorerLensEngine..." -ForegroundColor Cyan
          # /analyze:quiet suppresses SAL annotation noise; /wd6031 suppresses known false positives
          $env:CL = "/analyze:quiet /wd6031 /wd6285 /wd6387"
          $output = cmake --build --preset ci-release --target ExplorerLensEngine -j 4 2>&1 |
            Tee-Object -Variable buildOut

          $errors   = $buildOut | Select-String ": error C\d+|: error :"
          $warnings = $buildOut | Select-String ": warning C\d+|: warning :"

          if ($errors.Count -gt 0) {
            Write-Host "::error::$($errors.Count) error(s) found in static analysis" -ForegroundColor Red
            $errors | ForEach-Object { Write-Host "::error::$($_.Line)" }
            exit 1
          }
          if ($warnings.Count -gt 0) {
            Write-Host "::warning::$($warnings.Count) warning(s) reported (non-blocking — review in next sprint)"
            $warnings | Select-Object -First 20 | ForEach-Object { Write-Host "::warning::$($_.Line)" }
          } else {
            Write-Host "Zero errors · Zero warnings — static analysis clean" -ForegroundColor Green
          }

  header-check:
    name: Header Guard Validation
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Check header guards (blocking)
        shell: pwsh
        run: |
          $headers = Get-ChildItem -Path Engine,LENSShell,LENSManager -Recurse -Include *.h -ErrorAction SilentlyContinue
          $missing = @()
          foreach ($h in $headers) {
            $content = Get-Content $h.FullName -Raw -ErrorAction SilentlyContinue
            if ($content -and $content -notmatch '#pragma once' -and $content -notmatch '#ifndef\s+\w+_H') {
              $missing += $h.Name
            }
          }
          if ($missing.Count -gt 0) {
            Write-Host "::error::$($missing.Count) header(s) missing include guards:" -ForegroundColor Red
            $missing | ForEach-Object { Write-Host "::error::  Missing guard: $_" }
            exit 1
          }
          Write-Host "All $($headers.Count) headers have include guards" -ForegroundColor Green

  version-consistency:
    name: Version Consistency Check
    runs-on: windows-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Validate version consistency across all files
        shell: pwsh
        run: |
          $versionFile = Get-Content "VERSION" -Raw
          $canonical = $versionFile.Trim()
          Write-Host "Canonical version from VERSION file: $canonical"

          $failures = @()

          # Check root CMakeLists.txt
          $cmake = Get-Content "CMakeLists.txt" -Raw
          if ($cmake -notmatch "project\(ExplorerLens\s+VERSION\s+$([regex]::Escape($canonical))") {
            $failures += "CMakeLists.txt: project VERSION does not match $canonical"
          }

          # Check Engine/CMakeLists.txt
          $ecmake = Get-Content "Engine/CMakeLists.txt" -Raw
          if ($ecmake -notmatch "project\(ExplorerLensEngine\s+VERSION\s+$([regex]::Escape($canonical))") {
            $failures += "Engine/CMakeLists.txt: project VERSION does not match $canonical"
          }

          # Check BuildValidation.h
          $bv = Get-Content "Engine/Core/BuildValidation.h" -Raw
          if ($bv -notmatch [regex]::Escape("VersionString = `"$canonical`"")) {
            $failures += "Engine/Core/BuildValidation.h: VersionString does not match $canonical"
          }

          # Check CHANGELOG.md has an entry for this version
          $changelog = Get-Content "CHANGELOG.md" -Raw
          if ($changelog -notmatch [regex]::Escape("[$canonical]")) {
            $failures += "CHANGELOG.md: no entry found for [$canonical]"
          }

          # Check LENSManager.rc VERSIONINFO
          $ver = $canonical -replace '\.', ', '
          $rc = Get-Content "LENSManager/LENSManager.rc" -Raw
          if ($rc -notmatch [regex]::Escape("FILEVERSION     $ver, 0")) {
            $failures += "LENSManager/LENSManager.rc: FILEVERSION does not match $canonical"
          }

          if ($failures.Count -gt 0) {
            Write-Host "::error::Version consistency check FAILED:" -ForegroundColor Red
            $failures | ForEach-Object { Write-Host "::error::  - $_" }
            exit 1
          }
          Write-Host "Version consistency OK — all files report $canonical" -ForegroundColor Green
