# release-drafter.yml — Auto-draft the next release from merged PR titles
#
# Runs on every push to main. Updates a "Draft" release with categorized PR
# entries. When you tag vX.Y.Z, release.yml publishes the real release and
# this draft is reset for the next cycle.
#
# Configuration: .github/release-drafter.yml

name: Release Drafter

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-drafter-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  update-draft:
    name: Update release draft
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
