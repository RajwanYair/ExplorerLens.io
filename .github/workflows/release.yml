# ─────────────────────────────────────────────────────────────────────────────
# ExplorerLens Release Workflow
#
# TRIGGER:   git tag vX.Y.Z && git push origin main --tags
# PURPOSE:   Build all binaries → package → generate checksums → publish GitHub Release
#
# ARTIFACTS PUBLISHED ON EVERY VERSION TAG:
#   LENSShell.dll          Windows Shell Extension (COM IThumbnailProvider)
#   LENSManager.exe        WTL Configuration GUI
#   lens.exe               CLI tool (when present in build output)
#   ExplorerLens-X.Y.Z-x64.msi    Signed installer (WiX)
#   ExplorerLens-X.Y.Z-x64.zip    Portable archive with all binaries
#   SHA256SUMS.txt         Checksums for all artifacts
#   ExplorerLens-SBOM.json CycloneDX SBOM
#   verification-report.json  Build quality report
#
# Release is created as DRAFT. Merge to auto-publish or manually approve.
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version_override:
        description: "Version override (e.g. 15.2.0) — leave blank to read from tag"
        required: false
        default: ""

env:
  BUILD_TYPE: Release
  PLATFORM: x64

jobs:
  # ─── Job 1: Build all binaries ──────────────────────────────────────────────
  build:
    name: Build Release Binaries (MSVC v145)
    runs-on: windows-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      zip-name: ${{ steps.version.outputs.zip-name }}

    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      # ── Resolve version from tag or input ──────────────────────────────────
      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $ver = ""
          if ("${{ github.event.inputs.version_override }}" -ne "") {
            $ver = "${{ github.event.inputs.version_override }}"
          } elseif ($env:GITHUB_REF -match 'refs/tags/v(.+)') {
            $ver = $matches[1]
          } elseif (Test-Path VERSION) {
            $ver = (Get-Content VERSION -Raw).Trim()
          } else {
            $ver = "dev"
          }
          Write-Host "Release version: $ver" -ForegroundColor Cyan
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          echo "zip-name=ExplorerLens-$ver-x64.zip" >> $env:GITHUB_OUTPUT

      # ── Cache external/ pre-built libs (same key as build.yml) ───────────
      - name: Cache external libraries
        uses: actions/cache@v4
        with:
          path: external/
          key: external-libs-${{ hashFiles('build-scripts/external-libs/**') }}
          restore-keys: |
            external-libs-

      # ── Setup toolchain ────────────────────────────────────────────────────
      # NOTE: ilammy/msvc-dev-cmd brings the full MSVC environment (cl, link,
      # msbuild, rc, mt, lib). No separate setup-msbuild action needed.
      # GitHub windows-latest runner ships VS 2022 (MSVC v143, cl.exe 19.43).
      # When GitHub upgrades to VS 2026 runners, this auto-picks v145.

      - name: Setup .NET 10 SDK (for WiX + Manager.WinUI)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install WiX Toolset 6.x
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 6.0.2
          Write-Host "WiX: $(wix --version)" -ForegroundColor Green

      # ── Setup MSVC developer command prompt ────────────────────────────────
      # Brings cl.exe, link.exe, msbuild.exe, lib.exe, rc.exe, mt.exe on PATH.
      # No toolset pin: auto-selects latest VS installed on runner (currently v143).
      - name: Setup MSVC (latest available on runner)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      # ── Build external libraries from source ──────────────────────────────
      # Pre-built .lib files are never committed to git — they corrupt across
      # MSVC toolset versions. Source trees live in external/; built with
      # /MD /O2 (no /GL) so output is compatible with any toolset version.
      - name: Build external libraries
        uses: ./.github/actions/build-external-libs

      - name: Verify toolchain
        shell: pwsh
        run: |
          cl.exe 2>&1 | Select-Object -First 2
          Write-Host "CMake: $(cmake --version | Select-Object -First 1)" -ForegroundColor Cyan
          Write-Host "Ninja: $(ninja --version)" -ForegroundColor Cyan
          Write-Host "MSBuild: $(msbuild -version 2>&1 | Select-Object -First 1)" -ForegroundColor Cyan

      # ── Build Engine (CMake) ───────────────────────────────────────────────
      - name: Configure CMake (ci-release preset)
        shell: pwsh
        run: cmake --preset ci-release

      - name: Build Engine (Ninja + MSVC)
        shell: pwsh
        run: cmake --build --preset ci-release -j 8

      # ── Build Shell Extension + Manager (MSBuild) ──────────────────────────
      - name: Build LENSShell.dll + LENSManager.exe (MSBuild)
        shell: pwsh
        run: |
          msbuild LENSShell.sln `
            /t:Rebuild `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:WarningLevel=4 `
            /m /v:minimal

      # ── Build CLI if present ───────────────────────────────────────────────
      - name: Build lens.exe CLI (if CMake target exists)
        shell: pwsh
        run: |
          $targets = cmake --build --preset ci-release --target help 2>&1
          if ($targets -match 'LensCLI|lens_cli|lens-cli') {
            cmake --build --preset ci-release --target LensCLI -j 8
            Write-Host "✓ lens.exe built" -ForegroundColor Green
          } else {
            Write-Host "⚠ LensCLI target not yet available — skipping" -ForegroundColor Yellow
          }

      # ── Run unit tests ─────────────────────────────────────────────────────
      - name: Run Engine Tests
        shell: pwsh
        run: |
          $testExe = Get-ChildItem -Recurse -Filter "EngineTests.exe" | Select-Object -First 1
          if ($testExe) {
            Write-Host "Running: $($testExe.FullName)" -ForegroundColor Cyan
            & $testExe.FullName
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } else {
            Write-Host "⚠ EngineTests.exe not found — check build output" -ForegroundColor Yellow
          }

      # ── Collect all build outputs ──────────────────────────────────────────
      - name: Collect release binaries
        id: collect
        shell: pwsh
        run: |
          $stage = "release-staging"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          $version = "${{ steps.version.outputs.version }}"

          # Binary discovery: check multiple potential output locations
          $candidates = @{
            'LENSShell.dll'    = @('x64\Release\LENSShell.dll','build\bin\Release\LENSShell.dll','build\Release\LENSShell.dll')
            'LENSManager.exe'  = @('x64\Release\LENSManager.exe','build\bin\Release\LENSManager.exe','build\Release\LENSManager.exe')
            'lens.exe'         = @('build\bin\Release\lens.exe','build\bin\lens.exe','src\cli\Release\lens.exe')
          }

          $found = @()
          foreach ($name in $candidates.Keys) {
            foreach ($path in $candidates[$name]) {
              if (Test-Path $path) {
                Copy-Item $path "$stage\$name" -Force
                $found += $name
                Write-Host "  ✓ $name  ← $path" -ForegroundColor Green
                break
              }
            }
            if ($name -notin $found) {
              Write-Host "  ⚠ $name not found in any expected path" -ForegroundColor Yellow
            }
          }

          # Support files
          foreach ($f in @('README.md','LICENSE','Install-ExplorerLens.ps1','CHANGELOG.md')) {
            if (Test-Path $f) { Copy-Item $f "$stage\" -Force }
          }
          if (Test-Path 'scripts\lens-autocomplete.ps1') {
            Copy-Item 'scripts\lens-autocomplete.ps1' "$stage\" -Force
          }

          # Emit outputs
          $dllPath = "$stage\LENSShell.dll"
          echo "staging-dir=$stage" >> $env:GITHUB_OUTPUT
          echo "lens-shell-found=$(Test-Path $dllPath)" >> $env:GITHUB_OUTPUT

      # ── Build MSI (WiX via Build-Installer.ps1) ───────────────────────────
      - name: Build MSI installer
        id: msi
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $msiName = "ExplorerLens-$version-x64.msi"
          $rootDir  = $PWD.Path

          # Use the packaging script — it sets -define BuildDir=. correctly
          try {
            & .\packaging\Build-Installer.ps1 -Version $version -Configuration Release
            $msi = Get-ChildItem -Path packaging\output -Filter "*.msi" -ErrorAction SilentlyContinue |
                   Sort-Object LastWriteTime -Descending | Select-Object -First 1
          } catch {
            Write-Host "::warning::Build-Installer.ps1 failed: $($_.Exception.Message)" -ForegroundColor Yellow
          }

          # Fallback: wix build directly from the root if script failed
          if (-not $msi) {
            Write-Host "Attempting direct wix build as fallback..." -ForegroundColor Yellow
            try {
              wix build packaging\ExplorerLens.wxs `
                -out "packaging\output\$msiName" `
                -define "BuildDir=$rootDir" `
                -define "Version=$version" `
                -arch x64
              $msi = Get-Item "packaging\output\$msiName" -ErrorAction SilentlyContinue
            } catch {
              Write-Host "::warning::Direct wix build also failed: $($_.Exception.Message)" -ForegroundColor Yellow
            }
          }

          if ($msi) {
            Copy-Item $msi.FullName $msiName -Force
            Write-Host "✓ MSI: $msiName  ($('{0:N1}' -f ($msi.Length/1MB)) MB)" -ForegroundColor Green
            echo "msi-path=$msiName" >> $env:GITHUB_OUTPUT
            echo "msi-name=$msiName" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "::warning::MSI not produced — ZIP portable archive is the primary artifact" -ForegroundColor Yellow
            echo "msi-path=" >> $env:GITHUB_OUTPUT
            echo "msi-name=" >> $env:GITHUB_OUTPUT
          }

      # ── Create ZIP archive ─────────────────────────────────────────────────
      - name: Create portable ZIP
        shell: pwsh
        run: |
          $zipName = "${{ steps.version.outputs.zip-name }}"
          $stage   = "${{ steps.collect.outputs.staging-dir }}"
          Compress-Archive -Path "$stage\*" -DestinationPath $zipName -Force
          Write-Host "✓ ZIP: $zipName  ($('{0:N0}' -f (Get-Item $zipName).Length) bytes)" -ForegroundColor Green

      # ── Generate SHA256 checksums ──────────────────────────────────────────
      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $artifacts = Get-ChildItem -File | Where-Object {
            $_.Extension -in '.zip','.msi','.msix','.exe','.dll'
          }
          $lines = @("# ExplorerLens $version — SHA256 Checksums", "# Generated: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')", "")
          foreach ($f in $artifacts) {
            $hash = (Get-FileHash $f.FullName -Algorithm SHA256).Hash
            $lines += "$hash  $($f.Name)"
          }
          $lines | Set-Content SHA256SUMS.txt -Encoding UTF8
          Write-Host "SHA256SUMS.txt written ($($artifacts.Count) files)" -ForegroundColor Green
          Get-Content SHA256SUMS.txt

      # ── Generate/update SBOM ───────────────────────────────────────────────
      - name: Generate SBOM
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $sbomPath = "ExplorerLens-$version-SBOM.json"

          # Use existing SBOM as template; update version/timestamp
          if (Test-Path docs\SBOM.json) {
            $sbom = Get-Content docs\SBOM.json -Raw | ConvertFrom-Json
            $sbom.metadata.timestamp = (Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ')
            if ($sbom.metadata.component) { $sbom.metadata.component.version = $version }
            $sbom | ConvertTo-Json -Depth 20 | Set-Content $sbomPath -Encoding UTF8
          } else {
            # Minimal SBOM fallback
            @{
              bomFormat     = "CycloneDX"
              specVersion   = "1.5"
              version       = 1
              metadata      = @{
                timestamp = (Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ')
                component = @{ type = "application"; name = "ExplorerLens"; version = $version }
              }
              components = @()
            } | ConvertTo-Json -Depth 10 | Set-Content $sbomPath -Encoding UTF8
          }
          Write-Host "✓ SBOM: $sbomPath" -ForegroundColor Green

      # ── Build verification report ──────────────────────────────────────────
      - name: Build verification report
        shell: pwsh
        run: |
          $version   = "${{ steps.version.outputs.version }}"
          $reportPath = "verification-report-$version.json"

          $artifacts = @{}
          foreach ($f in (Get-ChildItem -File | Where-Object { $_.Extension -in '.zip','.msi','.exe','.dll' })) {
            $artifacts[$f.Name] = @{
              size = $f.Length
              sha256 = (Get-FileHash $f.FullName -Algorithm SHA256).Hash
              modified = $f.LastWriteTimeUtc.ToString('o')
            }
          }

          @{
            version     = $version
            buildTime   = (Get-Date -Format 'o')
            commit      = $env:GITHUB_SHA
            runner      = $env:RUNNER_OS
            artifacts   = $artifacts
          } | ConvertTo-Json -Depth 10 | Set-Content $reportPath -Encoding UTF8
          Write-Host "✓ Verification report: $reportPath" -ForegroundColor Green

      # ── Upload artifacts for release job ──────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ steps.version.outputs.version }}
          path: |
            ExplorerLens-*.zip
            ExplorerLens-*.msi
            ExplorerLens-*.msix
            SHA256SUMS.txt
            ExplorerLens-*-SBOM.json
            verification-report-*.json
          if-no-files-found: warn
          retention-days: 90

      # ── Upload individual binaries as their own artifact ──────────────────
      - name: Upload individual binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ steps.version.outputs.version }}
          path: |
            release-staging/LENSShell.dll
            release-staging/LENSManager.exe
            release-staging/lens.exe
          if-no-files-found: warn
          retention-days: 90

  # ─── Job 2: Create GitHub Release ──────────────────────────────────────────
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout (for CHANGELOG)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts-${{ needs.build.outputs.version }}
          path: dist/

      - name: Download individual binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-${{ needs.build.outputs.version }}
          path: dist/
        continue-on-error: true

      - name: Extract CHANGELOG section for this version
        id: changelog
        shell: bash
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \[$VERSION\]/,/^## \[/" CHANGELOG.md \
                  | grep -v "^## \[" | sed 's/^### /\n### /' | head -150)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for full details."
          fi
          # Write to file with social preview image header
          {
            echo '<img src="https://raw.githubusercontent.com/RajwanYair/ExplorerLens.io/main/docs/assets/social-preview.svg" alt="ExplorerLens" width="900"/>'
            echo ""
            echo "---"
            echo ""
            printf '%s' "$NOTES"
          } > release-notes-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: "ExplorerLens v${{ needs.build.outputs.version }}"
          draft: false
          prerelease: ${{ contains(needs.build.outputs.version, '-rc') || contains(needs.build.outputs.version, '-beta') }}
          body_path: release-notes-body.md
          files: |
            dist/ExplorerLens-*.zip
            dist/ExplorerLens-*.msi
            dist/ExplorerLens-*.msix
            dist/LENSShell.dll
            dist/LENSManager.exe
            dist/lens.exe
            dist/SHA256SUMS.txt
            dist/ExplorerLens-*-SBOM.json
            dist/verification-report-*.json
          fail_on_unmatched_files: false
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Job 3: Post-Release Verification ──────────────────────────────────────
  # Runs after the release is published. Validates artifacts, checksums, and
  # GitHub Release accessibility. Opens a GitHub Issue automatically if anything
  # fails so the team has an actionable ticket to work from.
  verify:
    name: Verify Release Health
    runs-on: ubuntu-latest
    needs: [build, publish]
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts-${{ needs.build.outputs.version }}
          path: dist/
        continue-on-error: true

      - name: Verify release
        id: verify
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          ERRORS=()
          WARNINGS=()

          # 1. Required artifact files must be present
          for f in \
              "ExplorerLens-${VERSION}-x64.zip" \
              "SHA256SUMS.txt" \
              "ExplorerLens-${VERSION}-SBOM.json" \
              "verification-report-${VERSION}.json"; do
            [[ ! -f "dist/$f" ]] && ERRORS+=("Missing required artifact: $f")
          done

          # 2. MSI is optional but warn when absent
          [[ ! -f "dist/ExplorerLens-${VERSION}-x64.msi" ]] && \
            WARNINGS+=("Optional artifact missing: ExplorerLens-${VERSION}-x64.msi")

          # 3. ZIP must contain LENSShell.dll
          if [[ -f "dist/ExplorerLens-${VERSION}-x64.zip" ]]; then
            if ! unzip -l "dist/ExplorerLens-${VERSION}-x64.zip" | grep -q "LENSShell.dll"; then
              ERRORS+=("ZIP does not contain LENSShell.dll")
            fi
          fi

          # 4. Verify SHA256 checksums
          if [[ -f "dist/SHA256SUMS.txt" ]]; then
            cd dist
            while read -r hash filename; do
              [[ "$hash" =~ ^[0-9A-Fa-f]{64}$ ]] || continue
              if [[ -f "$filename" ]]; then
                actual=$(sha256sum "$filename" | awk '{print $1}')
                [[ "${hash,,}" != "${actual,,}" ]] && ERRORS+=("Checksum mismatch: $filename")
              fi
            done < SHA256SUMS.txt
            cd ..
          fi

          # 5. GitHub Release must be accessible with ≥3 assets
          RELEASE_JSON=$(gh release view "v${VERSION}" --json tagName,assets 2>&1)
          if [[ $? -ne 0 ]]; then
            ERRORS+=("GitHub Release v${VERSION} not accessible: $RELEASE_JSON")
          else
            ASSET_COUNT=$(echo "$RELEASE_JSON" | python3 -c \
              "import sys,json; print(len(json.load(sys.stdin).get('assets',[])))")
            [[ "$ASSET_COUNT" -lt 3 ]] && \
              WARNINGS+=("Release has only $ASSET_COUNT assets (expected ≥3)")
          fi

          # 6. Tag version must match VERSION file
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          [[ "$VERSION" != "$FILE_VERSION" ]] && \
            WARNINGS+=("Tag version ($VERSION) differs from VERSION file ($FILE_VERSION)")

          # Persist results for later steps
          printf '%s\n' "${ERRORS[@]}"   > /tmp/verify-errors.txt   2>/dev/null || true
          printf '%s\n' "${WARNINGS[@]}" > /tmp/verify-warnings.txt 2>/dev/null || true

          if [[ ${#ERRORS[@]} -gt 0 ]]; then
            for e in "${ERRORS[@]}"; do echo "::error::$e"; done
            echo "status=failed" >> "$GITHUB_OUTPUT"
          elif [[ ${#WARNINGS[@]} -gt 0 ]]; then
            for w in "${WARNINGS[@]}"; do echo "::warning::$w"; done
            echo "status=warning" >> "$GITHUB_OUTPUT"
          else
            echo "status=passed" >> "$GITHUB_OUTPUT"
          fi

      - name: Write job summary
        if: always()
        shell: bash
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          STATUS="${{ steps.verify.outputs.status }}"
          echo "## Release v${VERSION} Verification — ${STATUS^^}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$STATUS" == "passed" ]]; then
            echo "✅ All checks passed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Errors"   >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/verify-errors.txt   >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "(none)" >> "$GITHUB_STEP_SUMMARY"
            echo ""              >> "$GITHUB_STEP_SUMMARY"
            echo "### Warnings" >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/verify-warnings.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "(none)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Open issue on verification failure
        if: steps.verify.outputs.status == 'failed'
        uses: actions/github-script@v7
        with:
          script: |
            const fs      = require('fs');
            const version = '${{ needs.build.outputs.version }}';
            const runUrl  = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const sha     = (process.env.GITHUB_SHA ?? '').slice(0, 8) || '(unknown)';

            let errors   = '';
            let warnings = '';
            try { errors   = fs.readFileSync('/tmp/verify-errors.txt',   'utf8').trim(); } catch {}
            try { warnings = fs.readFileSync('/tmp/verify-warnings.txt', 'utf8').trim(); } catch {}

            const body = [
              `## Release v${version} Verification Failed`,
              '',
              `Post-release verification for **v${version}** (commit \`${sha}\`) detected failures.`,
              `See the [workflow run](${runUrl}) for full details.`,
              '',
              '### Errors',
              '```',
              errors || '(see workflow logs)',
              '```',
              '',
              warnings ? `### Warnings\n\`\`\`\n${warnings}\n\`\`\`\n` : '',
              '### How to Fix',
              '1. Review the errors above and the linked workflow run.',
              '2. Fix the identified issue (missing binary, checksum mismatch, etc.).',
              `3. Re-trigger: \`git tag -d v${version} && git tag v${version} && git push origin --tags --force\``,
              '',
              `*Auto-created by [release verification](${runUrl})*`,
            ].join('\n');

            // Avoid duplicate issues — update existing open issue if present
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'release-failure',
            });
            const dup = existing.data.find(i => i.title.includes(`v${version}`));
            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: dup.number,
                body: `Re-run on ${new Date().toISOString()} still failing:\n\n${body}`,
              });
              console.log(`Updated existing issue #${dup.number}`);
            } else {
              const issue = await github.rest.issues.create({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title:  `Release v${version} verification failed`,
                body,
                labels: ['release-failure', 'bug'],
              });
              console.log(`Created issue #${issue.data.number}`);
            }
            core.setFailed('Release verification failed — see issue for details');
