name: CodeQL Security Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday 03:00 UTC (off-peak, keeps analysis fresh)
    - cron: '0 3 * * 1'
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

env:
  # Opt into Node.js 24 for all actions (avoids Node 20 deprecation warnings)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  analyze:
    name: CodeQL — C++ Security Analysis
    runs-on: windows-latest
    timeout-minutes: 60

    # GIT_CONFIG_COUNT: inject safe.directory via git env-var config so ALL
    # git invocations — including those inside github/codeql-action — bypass
    # the Windows runner ownership check without needing write access to the
    # system git config file.
    env:
      GIT_CONFIG_COUNT: 1
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: "*"

    steps:
      - name: Configure git safe.directory (pre-checkout)
        shell: pwsh
        run: |
          git config --global safe.directory '*'
          # Write to system config — suppressed because runner may lack permission;
          # GIT_CONFIG_COUNT env vars (set at job level below) provide a fallback.
          git config --system safe.directory '*' 2>&1 | Out-Null

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git safe.directory (post-checkout)
        shell: pwsh
        run: |
          # Set safe.directory in every scope so codeql-action's internal git
          # calls and the checkout POST-STEP both succeed on Windows runners.
          git config --global safe.directory '*'
          git config safe.directory '*'
          git config --system safe.directory '*' 2>&1 | Out-Null

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          # Security-focused query suite — covers OWASP Top 10 patterns for C++
          queries: security-extended,security-and-quality
          config: |
            query-filters:
              - exclude:
                  tags contain: experimental
            paths-ignore:
              - external/**
              - packages/**
              - gtest/**
              - build/**
              - build-vcpkg/**

      - name: Setup MSVC Environment (latest available on runner)
        # No toolset pin: auto-picks newest VS on runner (v143 currently; v145 when GH provides VS2026)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache external libraries
        uses: actions/cache@v4
        with:
          path: external/
          key: external-libs-${{ hashFiles('build-scripts/external-libs/**') }}
          restore-keys: |
            external-libs-

      - name: Build external libraries
        uses: ./.github/actions/build-external-libs
        continue-on-error: true  # CodeQL analysis can proceed without pre-built external libs

      - name: Configure CMake (ci-release)
        shell: pwsh
        run: cmake --preset ci-release

      - name: Build for CodeQL
        shell: pwsh
        run: |
          # Build EngineTests only — not the full package — to keep analysis focused
          # and stay within the 60-minute timeout
          cmake --build --preset ci-release --target ExplorerLensEngine EngineTests -j 4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: cpp-security
          # Upload to GitHub Security tab (Code Scanning alerts)
          upload: always
          output: sarif-results

      - name: Upload SARIF Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif-${{ github.run_number }}
          path: sarif-results/
          retention-days: 30
