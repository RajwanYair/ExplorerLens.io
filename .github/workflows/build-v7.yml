name: Build and Test v7

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      build_config:
        description: "Build configuration"
        required: false
        default: "Release"
        type: choice
        options:
          - Release
          - Debug

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.config }})
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        config: [Release, Debug]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "3af1d1e60af2b2abf55760538cd607829029b07a"

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/installed
            ${{ env.VCPKG_ROOT }}/packages
            ${{ env.VCPKG_ROOT }}/downloads
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}-${{ matrix.config }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-
            vcpkg-${{ runner.os }}-

      - name: Configure CMake (vcpkg + Ninja)
        shell: pwsh
        run: |
          cmake --preset vcpkg-${{ matrix.config == 'Release' && 'release' || 'debug' }}

      - name: Build DarkThumbs
        shell: pwsh
        run: |
          cmake --build --preset vcpkg-${{ matrix.config == 'Release' && 'release' || 'debug' }} --parallel 4

      - name: Run Unit Tests
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          if (Test-Path "tests/run-all-tests.cmd") {
            & "tests/run-all-tests.cmd"
          } else {
            Write-Host "No test runner found, skipping tests" -ForegroundColor Yellow
          }
        continue-on-error: true

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        if: matrix.config == 'Release'
        with:
          name: darkthumbs-binaries-${{ github.sha }}
          path: |
            x64/Release/CBXShell.dll
            x64/Release/CBXManager.exe
            x64/Release/*.pdb
          retention-days: 7

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.config }}
          path: |
            tests/TEST_RESULTS_*.md
            tests/build/*.log
          retention-days: 3

  package:
    name: Create Release Package
    runs-on: windows-2022
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: darkthumbs-binaries-${{ github.sha }}
          path: x64/Release/

      - name: Get version
        id: get_version
        shell: pwsh
        run: |
          $version = (Select-String -Path "CMakeLists.txt" -Pattern 'project\(DarkThumbs VERSION ([\d.]+)\)').Matches.Groups[1].Value
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      - name: Create Portable ZIP
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          $zipName = "DarkThumbs-v$version-Portable-x64.zip"

          # Create package directory
          $pkgDir = "package-temp"
          New-Item -ItemType Directory -Path $pkgDir -Force

          # Copy binaries
          Copy-Item "x64/Release/CBXShell.dll" -Destination $pkgDir
          Copy-Item "x64/Release/CBXManager.exe" -Destination $pkgDir

          # Copy documentation
          Copy-Item "README.md" -Destination $pkgDir
          Copy-Item "LICENSE" -Destination $pkgDir
          Copy-Item "CHANGELOG.md" -Destination $pkgDir -ErrorAction SilentlyContinue

          # Create ZIP
          Compress-Archive -Path "$pkgDir\*" -DestinationPath $zipName

          # Generate checksum
          $hash = (Get-FileHash $zipName -Algorithm SHA256).Hash
          "$hash  $zipName" | Out-File "$zipName.sha256" -Encoding ASCII

          Write-Host "Created $zipName" -ForegroundColor Green
          Write-Host "SHA256: $hash" -ForegroundColor Cyan

      - name: Upload Release Package
        uses: actions/upload-artifact@v4
        with:
          name: release-package-${{ steps.get_version.outputs.version }}
          path: |
            DarkThumbs-*.zip
            DarkThumbs-*.sha256
          retention-days: 30

      - name: Create Release (on main branch)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: DarkThumbs v${{ steps.get_version.outputs.version }}
          draft: true
          prerelease: false
          files: |
            DarkThumbs-*.zip
            DarkThumbs-*.sha256
          body: |
            ## DarkThumbs v${{ steps.get_version.outputs.version }}

            ### What's New
            - See [CHANGELOG.md](CHANGELOG.md) for details

            ### Installation
            1. Download `DarkThumbs-v${{ steps.get_version.outputs.version }}-Portable-x64.zip`
            2. Extract to a folder (e.g., `C:\Program Files\DarkThumbs`)
            3. Run `CBXManager.exe` as Administrator
            4. Click "Register" to install the thumbnail provider
            5. Restart Windows Explorer

            ### Verification
            ```powershell
            # Verify SHA256 checksum
            $expected = Get-Content "DarkThumbs-v${{ steps.get_version.outputs.version }}-Portable-x64.zip.sha256"
            $actual = (Get-FileHash "DarkThumbs-v${{ steps.get_version.outputs.version }}-Portable-x64.zip").Hash
            if ($actual -eq $expected.Split()[0]) { "✓ Checksum OK" } else { "✗ Checksum FAILED" }
            ```

            ### System Requirements
            - Windows 10 22H2+ or Windows 11
            - DirectX 12 compatible GPU (for GPU acceleration)
            - Visual C++ Redistributable 2022 (x64)

            ### Supported Formats
            200+ file formats including CBZ, CBR, ZIP, RAR, WebP, AVIF, HEIF, JXL, and more.

            For full documentation, see [README.md](README.md)

  analyze:
    name: Code Analysis
    runs-on: windows-2022
    permissions:
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          queries: security-and-quality

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "3af1d1e60af2b2abf55760538cd607829029b07a"

      - name: Build for Analysis
        shell: pwsh
        run: |
          cmake --preset vcpkg-release
          cmake --build --preset vcpkg-release --parallel 2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
