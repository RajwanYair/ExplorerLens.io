# test.yml — Scheduled / manual test-only workflow for ExplorerLens Engine
# Copyright (c) 2026 ExplorerLens Project
#
# Runs full test suite weekly (Sunday 2 AM UTC) or on manual dispatch.
# Downloads build artifact, executes tests, uploads report.

name: Test Suite

on:
  workflow_dispatch:
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'

env:
  VCPKG_DISABLE_METRICS: 1

jobs:
  test:
    name: Full Test Suite
    runs-on: windows-latest   # Latest GitHub runner (VS 2022 v143); upgrades automatically
    timeout-minutes: 60

    steps:
      # ── Checkout (needed for test infrastructure) ────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      # ── Cache external/ ──────────────────────────────────────
      - name: Cache external libraries
        uses: actions/cache@v4
        with:
          path: external/
          key: external-libs-${{ hashFiles('build-scripts/external-libs/**') }}
          restore-keys: |
            external-libs-

      # ── Setup MSVC ───────────────────────────────────────────
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build external libraries
        uses: ./.github/actions/build-external-libs

      # ── Try to download latest build artifact ────────────────
      - name: Download build artifact
        id: download
        uses: actions/download-artifact@v4
        with:
          name: build-x64-release
          path: build/bin
        continue-on-error: true

      # ── Rebuild if no artifact available ─────────────────────
      - name: Rebuild if needed
        if: steps.download.outcome == 'failure'
        shell: pwsh
        run: |
          Write-Host "No cached build artifact — rebuilding..." -ForegroundColor Yellow
          cmake --preset default-release
          cmake --build --preset default-release -j $env:NUMBER_OF_PROCESSORS

      # ── Run full test suite ──────────────────────────────────
      - name: Run full test suite
        shell: pwsh
        run: |
          $testExe = "build/bin/EngineTests.exe"
          if (Test-Path $testExe) {
            Write-Host "Running EngineTests..." -ForegroundColor Cyan
            & $testExe | Tee-Object -FilePath build-logs/test-full-run.log
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Tests failed with exit code $LASTEXITCODE"
              exit $LASTEXITCODE
            }
          } else {
            Write-Error "EngineTests.exe not found at $testExe"
            exit 1
          }

      # ── Run CTest for structured output ──────────────────────
      - name: Run CTest
        shell: pwsh
        run: |
          ctest --test-dir build -C Release --output-on-failure -j 4

      # ── Generate test report ─────────────────────────────────
      - name: Generate test report
        if: always()
        shell: pwsh
        run: |
          $logFile = "build-logs/test-full-run.log"
          if (Test-Path $logFile) {
            $content = Get-Content $logFile -Raw
            $passed = ([regex]::Matches($content, "PASS")).Count
            $failed = ([regex]::Matches($content, "FAIL")).Count
            Write-Host ""
            Write-Host "=============================="
            Write-Host "  Test Report Summary"
            Write-Host "  Passed: $passed"
            Write-Host "  Failed: $failed"
            Write-Host "=============================="
          }

      # ── Upload test results ──────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-full
          path: |
            build/Testing/**/*.xml
            build-logs/test-*.log
          retention-days: 60
