name: ARM64 Build Matrix

on:
  push:
    branches: [main, develop, release/*]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build configuration"
        required: false
        default: "Release"
        type: choice
        options: [Release, Debug, RelWithDebInfo]

env:
  CMAKE_VERSION: "3.20"
  MSVC_TOOLSET: "v145"
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}

jobs:
  # ============================================================
  # Job 1: ARM64 Windows Native Build
  # ============================================================
  arm64-windows:
    name: ARM64 Windows (${{ matrix.config }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        config: [Release, Debug]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSVC for ARM64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_arm64

      - name: Cache CMake build directory
        uses: actions/cache@v4
        with:
          path: build-arm64
          key: arm64-cmake-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'Engine/CMakeLists.txt') }}
          restore-keys: |
            arm64-cmake-${{ runner.os }}-

      - name: Configure CMake for ARM64
        run: |
          cmake -B build-arm64 -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} `
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-windows-arm64.cmake `
            -DBUILD_TESTS=ON `
            -DBUILD_BENCHMARKS=ON `
            -DARM64_BUILD=ON
        shell: pwsh

      - name: Build Engine (ARM64)
        run: cmake --build build-arm64 --config ${{ matrix.config }} -j 4
        shell: pwsh

      - name: Upload ARM64 artifacts
        uses: actions/upload-artifact@v4
        if: matrix.config == 'Release'
        with:
          name: ExplorerLens-arm64-${{ github.sha }}
          path: |
            build-arm64/Engine/Release/ExplorerLensEngine.lib
          retention-days: 7

  # ============================================================
  # Job 2: Cross-compile Check (x64 host → ARM64 target)
  # ============================================================
  cross-compile-check:
    name: Cross-compile Validation
    runs-on: windows-latest
    needs: []

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSVC cross-compile environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_arm64

      - name: Verify ARM64 toolchain availability
        run: |
          Write-Host "=== ARM64 Toolchain Validation ===" -ForegroundColor Cyan
          # Verify cl.exe is ARM64-targeting
          $clPath = (Get-Command cl.exe -ErrorAction SilentlyContinue)?.Source
          if ($clPath) {
              Write-Host "CL: $clPath" -ForegroundColor Green
          } else {
              Write-Host "WARNING: cl.exe not found in PATH" -ForegroundColor Yellow
          }
          # Check for ARM64 libraries
          $vcToolsRoot = $env:VCToolsInstallDir
          if ($vcToolsRoot) {
              $arm64LibPath = Join-Path $vcToolsRoot "lib\arm64"
              if (Test-Path $arm64LibPath) {
                  Write-Host "ARM64 libs found: $arm64LibPath" -ForegroundColor Green
              } else {
                  Write-Host "ARM64 lib path not found: $arm64LibPath" -ForegroundColor Yellow
              }
          }
        shell: pwsh

      - name: Validate ARM64Platform header
        run: |
          $headerPath = "Engine/Utils/ARM64Platform.h"
          if (Test-Path $headerPath) {
              Write-Host "ARM64Platform.h found ✓" -ForegroundColor Green
              $content = Get-Content $headerPath -Raw
              if ($content -match "ARM64BuildConfig") {
                  Write-Host "Header content valid ✓" -ForegroundColor Green
              }
          } else {
              Write-Error "ARM64Platform.h missing!"
          }
        shell: pwsh

  # ============================================================
  # Job 3: ARM64 Library Matrix Validation
  # ============================================================
  arm64-library-matrix:
    name: ARM64 Library Compatibility Check
    runs-on: windows-latest
    needs: [arm64-windows]
    if: success()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check external library ARM64 support stubs
        run: |
          Write-Host "=== ARM64 Library Matrix ===" -ForegroundColor Cyan
          $libs = @(
              @{ Name = "zlib";       Path = "external/compression-libs/zlib-1.3.1" },
              @{ Name = "LZ4";        Path = "external/compression-libs/lz4-1.10.0" },
              @{ Name = "zstd";       Path = "external/compression-libs/zstd-1.5.7" },
              @{ Name = "LZMA";       Path = "external/compression-libs/lzma" },
              @{ Name = "libwebp";    Path = "external/image-libs/libwebp-1.5.0" },
              @{ Name = "libraw";     Path = "external/camera-libs/libraw" }
          )
          foreach ($lib in $libs) {
              $exists = Test-Path $lib.Path
              $status = if ($exists) { "✓ present" } else { "○ not found (may be skipped)" }
              $color  = if ($exists) { "Green" } else { "Yellow" }
              Write-Host "  $($lib.Name): $status" -ForegroundColor $color
          }
        shell: pwsh

      - name: Summary
        run: |
          Write-Host ""
          Write-Host "=== ARM64 CI Integration Summary ===" -ForegroundColor Cyan
          Write-Host "Workflow: arm64.yml (Sprint 159)" -ForegroundColor White
          Write-Host "Status:   All ARM64 validation steps completed" -ForegroundColor Green
        shell: pwsh
