# Code Signing Pipeline — v23.6.0 "Vega-W"
# Signs release binaries using Azure Trusted Signing or self-signed cert.
# Runs as part of the release workflow after binaries are built.
#
# Required secrets:
#   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET (Azure Trusted Signing)
#   CODE_SIGN_CERT_B64  (fallback: base64-encoded PFX)
#   CODE_SIGN_CERT_PASS (PFX password)
name: Code Signing

on:
  workflow_call:
    inputs:
      artifact_dir:
        description: 'Directory containing binaries to sign'
        required: true
        type: string
        default: 'release-staging'
    secrets:
      AZURE_TENANT_ID:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_CLIENT_SECRET:
        required: false
      CODE_SIGN_CERT_B64:
        required: false
      CODE_SIGN_CERT_PASS:
        required: false

  workflow_dispatch:
    inputs:
      artifact_dir:
        description: 'Directory of binaries to sign'
        required: false
        default: 'release-staging'

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sign-binaries:
    name: Sign Binaries
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: ${{ inputs.artifact_dir || 'release-staging' }}
        continue-on-error: true  # May not be available in standalone runs

      - name: Detect signing method
        id: sign-method
        shell: pwsh
        run: |
          $hasAzure = ("${{ secrets.AZURE_TENANT_ID }}" -ne "") -and
                      ("${{ secrets.AZURE_CLIENT_ID }}" -ne "") -and
                      ("${{ secrets.AZURE_CLIENT_SECRET }}" -ne "")
          $hasCert  = "${{ secrets.CODE_SIGN_CERT_B64 }}" -ne ""
          if ($hasAzure) {
            "method=azure" | Out-File $env:GITHUB_OUTPUT -Append
            Write-Host "Signing method: Azure Trusted Signing"
          } elseif ($hasCert) {
            "method=pfx" | Out-File $env:GITHUB_OUTPUT -Append
            Write-Host "Signing method: PFX certificate"
          } else {
            "method=none" | Out-File $env:GITHUB_OUTPUT -Append
            Write-Warning "No signing credentials configured. Skipping signature."
          }

      - name: Install Azure Signing Tool
        if: steps.sign-method.outputs.method == 'azure'
        shell: pwsh
        run: |
          dotnet tool install --global AzureSignTool --version 4.0.1
          Write-Host "AzureSignTool installed"

      - name: Sign with Azure Trusted Signing
        if: steps.sign-method.outputs.method == 'azure'
        shell: pwsh
        env:
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          $dir = "${{ inputs.artifact_dir || 'release-staging' }}"
          $binaries = Get-ChildItem $dir -Include *.dll,*.exe -Recurse
          foreach ($bin in $binaries) {
            Write-Host "Signing: $($bin.Name)"
            AzureSignTool sign `
              --azure-key-vault-url       "https://explorerlens-signing.vault.azure.net" `
              --azure-key-vault-client-id $env:AZURE_CLIENT_ID `
              --azure-key-vault-tenant-id $env:AZURE_TENANT_ID `
              --azure-key-vault-client-secret $env:AZURE_CLIENT_SECRET `
              --azure-key-vault-certificate "ExplorerLens-CodeSign" `
              --timestamp-rfc3161         "http://timestamp.digicert.com" `
              --description               "ExplorerLens Shell Extension" `
              --description-url           "https://github.com/RajwanYair/ExplorerLens.io" `
              $bin.FullName
          }

      - name: Sign with PFX certificate
        if: steps.sign-method.outputs.method == 'pfx'
        shell: pwsh
        env:
          CERT_B64:  ${{ secrets.CODE_SIGN_CERT_B64 }}
          CERT_PASS: ${{ secrets.CODE_SIGN_CERT_PASS }}
        run: |
          # Decode PFX from base64 secret
          $certBytes = [Convert]::FromBase64String($env:CERT_B64)
          $certPath  = Join-Path $env:TEMP "signing.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)

          # Find signtool.exe dynamically (SDK version varies across runners)
          $signtoolDir = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Directory |
            Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } |
            Sort-Object Name -Descending | Select-Object -First 1
          $signtool = Join-Path $signtoolDir.FullName "x64\signtool.exe"
          if (-not (Test-Path $signtool)) {
            Write-Host "::error::signtool.exe not found in Windows Kits" ; exit 1
          }
          Write-Host "Using signtool: $signtool" -ForegroundColor Cyan

          $dir = "${{ inputs.artifact_dir || 'release-staging' }}"
          Get-ChildItem $dir -Include *.dll,*.exe -Recurse | ForEach-Object {
            Write-Host "Signing: $($_.Name)"
            & $signtool sign `
              /f $certPath /p $env:CERT_PASS `
              /tr "http://timestamp.digicert.com" /td sha256 /fd sha256 `
              /d "ExplorerLens Shell Extension" $_.FullName
          }
          Remove-Item $certPath -Force

      - name: Verify signatures
        if: steps.sign-method.outputs.method != 'none'
        shell: pwsh
        run: |
          $dir = "${{ inputs.artifact_dir || 'release-staging' }}"
          $binaries = Get-ChildItem $dir -Include *.dll,*.exe -Recurse
          $allSigned = $true
          foreach ($bin in $binaries) {
            $sig = Get-AuthenticodeSignature $bin.FullName
            if ($sig.Status -eq 'Valid') {
              Write-Host "$($bin.Name): SIGNED (Subject: $($sig.SignerCertificate.Subject))"
            } else {
              Write-Warning "$($bin.Name): $($sig.Status)"
              $allSigned = $false
            }
          }
          if (-not $allSigned) {
            Write-Error "One or more binaries failed signature verification"
            exit 1
          }

      - name: Sign skipped — no credentials
        if: steps.sign-method.outputs.method == 'none'
        shell: pwsh
        run: |
          Write-Host "::notice::Code signing skipped (no signing credentials configured)."
          Write-Host "To enable signing, add AZURE_TENANT_ID/AZURE_CLIENT_ID/AZURE_CLIENT_SECRET"
          Write-Host "or CODE_SIGN_CERT_B64/CODE_SIGN_CERT_PASS as repository secrets."
