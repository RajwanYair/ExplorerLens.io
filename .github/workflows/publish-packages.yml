# ─────────────────────────────────────────────────────────────────────────────
# ExplorerLens — Publish GitHub Packages
#
# TRIGGER:  Automatically on each published GitHub Release (release: published).
#           Also supports manual dispatch for re-publishing a specific version.
#
# REGISTRIES:
#   NuGet      → https://nuget.pkg.github.com/RajwanYair/index.json
#   npm        → https://npm.pkg.github.com  (@rajwanyair/explorerlens)
#   Container  → ghcr.io/rajwanyair/explorerlens
#
# DROPPED (R5 — no consumers):  Maven, RubyGems
#
# All jobs run in parallel and are independent — a failure in one does not
# block the others.
# ─────────────────────────────────────────────────────────────────────────────

name: Publish GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 32.3.0 — no 'v' prefix)"
        required: true
        type: string

permissions:
  contents: read           # checkout code
  packages: write          # push to GitHub Packages (NuGet, npm, Container)
  id-token: write          # OIDC token for container signing (future)

concurrency:
  group: publish-packages-${{ github.ref }}
  cancel-in-progress: false

env:
  GH_OWNER: RajwanYair
  GH_REPO:  ExplorerLens.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ── NuGet ──────────────────────────────────────────────────────────────────────
jobs:
  publish-nuget:
    name: "NuGet → GitHub Packages"
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write
    env:
      GIT_CONFIG_COUNT: 1
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: "*"
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            $v = "${{ github.event.inputs.version }}"
          } elseif ("${{ github.event.release.tag_name }}" -ne "") {
            $v = "${{ github.event.release.tag_name }}" -replace '^v', ''
          } else {
            $v = (Get-Content VERSION -Raw).Trim()
          }
          Write-Host "Publishing NuGet package version: $v" -ForegroundColor Cyan
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Download release ZIP
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $v = "${{ steps.version.outputs.version }}"
          gh release download "v$v" --pattern "ExplorerLens-$v-x64.zip" --dir dist
          Expand-Archive "dist\ExplorerLens-$v-x64.zip" -DestinationPath dist\extracted

      - name: Stage NuGet content
        shell: pwsh
        run: |
          $stage = "packaging\nuget\stage"
          New-Item -ItemType Directory -Force "$stage\include", "$stage\lib", "$stage\bin" | Out-Null

          # SDK public headers
          if (Test-Path "SDK") {
            Get-ChildItem "SDK" -Recurse -File | Where-Object { $_.Extension -in '.h','.hpp' } | ForEach-Object {
              $rel  = $_.FullName.Substring((Resolve-Path "SDK").Path.Length + 1)
              $dest = Join-Path "$stage\include" $rel
              New-Item -ItemType Directory -Force (Split-Path $dest) | Out-Null
              Copy-Item $_.FullName $dest -Force
            }
            Copy-Item "SDK\plugin_api.h"       "$stage\include\" -Force -ErrorAction SilentlyContinue
            Copy-Item "SDK\PublicSDKSurface.h"  "$stage\include\" -Force -ErrorAction SilentlyContinue
            Copy-Item "SDK\PluginSDKv2.h"       "$stage\include\" -Force -ErrorAction SilentlyContinue
          }
          Copy-Item "Engine\Engine.h" "$stage\include\" -Force -ErrorAction SilentlyContinue

          # Binaries from release ZIP
          foreach ($name in @("ExplorerLensEngine.lib", "ExplorerLensEngine.dll")) {
            $src = Get-ChildItem dist\extracted -Recurse -Filter $name | Select-Object -First 1
            if ($src) {
              $dest = if ($name -match '\.lib$') { "$stage\lib\$name" } else { "$stage\bin\$name" }
              Copy-Item $src.FullName $dest -Force
              Write-Host "  Staged: $name" -ForegroundColor Green
            } else {
              Write-Host "  Not found in ZIP: $name" -ForegroundColor Yellow
            }
          }

          # Documentation
          foreach ($f in @("README.md", "LICENSE", "CHANGELOG.md")) {
            if (Test-Path $f) { Copy-Item $f "$stage\$f" -Force }
          }

      - name: Pack NuGet package
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.version }}"
          New-Item -ItemType Directory -Force "packaging\nuget\dist" | Out-Null
          nuget pack "packaging\nuget\ExplorerLens.SDK.nuspec" `
            -Version $v `
            -OutputDirectory "packaging\nuget\dist" `
            -NonInteractive
          Write-Host "Packed: $(Get-ChildItem packaging\nuget\dist\*.nupkg | Select-Object -First 1)" -ForegroundColor Green

      - name: Add GitHub Packages NuGet source
        shell: pwsh
        run: |
          dotnet nuget add source `
            "https://nuget.pkg.github.com/${{ env.GH_OWNER }}/index.json" `
            --name "github-explorerlens" `
            --username "${{ github.actor }}" `
            --password "${{ secrets.GITHUB_TOKEN }}" `
            --store-password-in-clear-text

      - name: Push NuGet package
        shell: pwsh
        run: |
          dotnet nuget push "packaging\nuget\dist\*.nupkg" `
            --source "github-explorerlens" `
            --skip-duplicate

  # ── npm ───────────────────────────────────────────────────────────────────────
  publish-npm:
    name: "npm → GitHub Packages"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            V="${{ github.event.release.tag_name }}"
            V="${V#v}"
          else
            V="$(cat VERSION)"
          fi
          echo "Publishing npm package version: $V"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@rajwanyair"

      - name: Set package version
        run: |
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version
        working-directory: packaging/npm

      - name: Publish npm package
        run: npm publish --access public
        working-directory: packaging/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Container (ghcr.io) ───────────────────────────────────────────────────────
  publish-container:
    name: "Container → ghcr.io"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            V="${{ github.event.release.tag_name }}"
            V="${V#v}"
          else
            V="$(cat VERSION)"
          fi
          echo "Publishing container version: $V"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ env.GH_OWNER }}/explorerlens
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=ExplorerLens SDK
            org.opencontainers.image.description=GPU-accelerated thumbnail provider SDK for 200+ file formats

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push container image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: EXPLORERLENS_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Publish Summary ───────────────────────────────────────────────────────────
  publish-summary:
    name: "Publish Summary"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - publish-nuget
      - publish-npm
      - publish-container
    permissions:
      contents: read

    steps:
      - name: Report publish results
        env:
          NUGET_RESULT:     ${{ needs.publish-nuget.result }}
          NPM_RESULT:       ${{ needs.publish-npm.result }}
          CONTAINER_RESULT: ${{ needs.publish-container.result }}
        run: |
          status_icon() {
            case "$1" in
              success)  echo "✅" ;;
              skipped)  echo "⏭️" ;;
              *)        echo "❌" ;;
            esac
          }

          echo "## GitHub Packages Publish Summary"                >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                   >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry          | Status |"                    >> "$GITHUB_STEP_SUMMARY"
          echo "|-------------------|--------|"                    >> "$GITHUB_STEP_SUMMARY"
          echo "| NuGet             | $(status_icon "$NUGET_RESULT")     $NUGET_RESULT |"     >> "$GITHUB_STEP_SUMMARY"
          echo "| npm               | $(status_icon "$NPM_RESULT")       $NPM_RESULT |"       >> "$GITHUB_STEP_SUMMARY"
          echo "| Container (ghcr)  | $(status_icon "$CONTAINER_RESULT") $CONTAINER_RESULT |" >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                   >> "$GITHUB_STEP_SUMMARY"

          FAILED=0
          for result in "$NUGET_RESULT" "$NPM_RESULT" "$CONTAINER_RESULT"; do
            [ "$result" = "failure" ] && FAILED=$((FAILED + 1))
          done

          if [ "$FAILED" -eq 0 ]; then
            echo "All package registries published successfully." >> "$GITHUB_STEP_SUMMARY"
            echo "All package registries published successfully."
          else
            echo "⚠️  $FAILED registry/registries failed." >> "$GITHUB_STEP_SUMMARY"
            echo "$FAILED registry/registries failed — check individual job logs."
            exit 1
          fi
