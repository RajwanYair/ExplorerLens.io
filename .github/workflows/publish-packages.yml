# ─────────────────────────────────────────────────────────────────────────────
# ExplorerLens — Publish GitHub Packages
#
# TRIGGER:  Automatically on each published GitHub Release (release: published).
#           Also supports manual dispatch for re-publishing a specific version.
#
# REGISTRIES:
#   NuGet      → https://nuget.pkg.github.com/RajwanYair/index.json
#   npm        → https://npm.pkg.github.com  (@rajwanyair/explorerlens)
#   Container  → ghcr.io/rajwanyair/explorerlens
#   Maven      → https://maven.pkg.github.com/RajwanYair/ExplorerLens.io
#   RubyGems   → https://rubygems.pkg.github.com/RajwanYair
#
# All jobs run in parallel and are independent — a failure in one does not
# block the others.
# ─────────────────────────────────────────────────────────────────────────────

name: Publish GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 32.3.0 — no 'v' prefix)"
        required: true
        type: string

concurrency:
  group: publish-packages-${{ github.ref }}
  cancel-in-progress: false

env:
  GH_OWNER: RajwanYair
  GH_REPO:  ExplorerLens.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ── NuGet ──────────────────────────────────────────────────────────────────────
jobs:
  publish-nuget:
    name: "NuGet → GitHub Packages"
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            $v = "${{ github.event.inputs.version }}"
          } elseif ("${{ github.event.release.tag_name }}" -ne "") {
            $v = "${{ github.event.release.tag_name }}" -replace '^v', ''
          } else {
            $v = (Get-Content VERSION -Raw).Trim()
          }
          Write-Host "Publishing NuGet package version: $v" -ForegroundColor Cyan
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Download release ZIP
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $v = "${{ steps.version.outputs.version }}"
          gh release download "v$v" --pattern "ExplorerLens-$v-x64.zip" --dir dist
          Expand-Archive "dist\ExplorerLens-$v-x64.zip" -DestinationPath dist\extracted

      - name: Stage NuGet content
        shell: pwsh
        run: |
          $stage = "packaging\nuget\stage"
          New-Item -ItemType Directory -Force "$stage\include", "$stage\lib", "$stage\bin" | Out-Null

          # SDK public headers
          if (Test-Path "SDK") {
            Get-ChildItem "SDK" -Recurse -File | Where-Object { $_.Extension -in '.h','.hpp' } | ForEach-Object {
              $rel  = $_.FullName.Substring((Resolve-Path "SDK").Path.Length + 1)
              $dest = Join-Path "$stage\include" $rel
              New-Item -ItemType Directory -Force (Split-Path $dest) | Out-Null
              Copy-Item $_.FullName $dest -Force
            }
            Copy-Item "SDK\plugin_api.h"       "$stage\include\" -Force -ErrorAction SilentlyContinue
            Copy-Item "SDK\PublicSDKSurface.h"  "$stage\include\" -Force -ErrorAction SilentlyContinue
            Copy-Item "SDK\PluginSDKv2.h"       "$stage\include\" -Force -ErrorAction SilentlyContinue
          }
          Copy-Item "Engine\Engine.h" "$stage\include\" -Force -ErrorAction SilentlyContinue

          # Binaries from release ZIP
          foreach ($name in @("ExplorerLensEngine.lib", "ExplorerLensEngine.dll")) {
            $src = Get-ChildItem dist\extracted -Recurse -Filter $name | Select-Object -First 1
            if ($src) {
              $dest = if ($name -match '\.lib$') { "$stage\lib\$name" } else { "$stage\bin\$name" }
              Copy-Item $src.FullName $dest -Force
              Write-Host "  Staged: $name" -ForegroundColor Green
            } else {
              Write-Host "  Not found in ZIP: $name" -ForegroundColor Yellow
            }
          }

          # Documentation
          foreach ($f in @("README.md", "LICENSE", "CHANGELOG.md")) {
            if (Test-Path $f) { Copy-Item $f "$stage\$f" -Force }
          }

      - name: Pack NuGet package
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.version }}"
          New-Item -ItemType Directory -Force "packaging\nuget\dist" | Out-Null
          nuget pack "packaging\nuget\ExplorerLens.SDK.nuspec" `
            -Version $v `
            -OutputDirectory "packaging\nuget\dist" `
            -NonInteractive
          Write-Host "Packed: $(Get-ChildItem packaging\nuget\dist\*.nupkg | Select-Object -First 1)" -ForegroundColor Green

      - name: Add GitHub Packages NuGet source
        shell: pwsh
        run: |
          dotnet nuget add source `
            "https://nuget.pkg.github.com/${{ env.GH_OWNER }}/index.json" `
            --name "github-explorerlens" `
            --username "${{ github.actor }}" `
            --password "${{ secrets.GITHUB_TOKEN }}" `
            --store-password-in-clear-text

      - name: Push NuGet package
        shell: pwsh
        run: |
          dotnet nuget push "packaging\nuget\dist\*.nupkg" `
            --source "github-explorerlens" `
            --skip-duplicate

  # ── npm ───────────────────────────────────────────────────────────────────────
  publish-npm:
    name: "npm → GitHub Packages"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            V="${{ github.event.release.tag_name }}"
            V="${V#v}"
          else
            V="$(cat VERSION)"
          fi
          echo "Publishing npm package version: $V"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@rajwanyair"

      - name: Set package version
        run: |
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version
        working-directory: packaging/npm

      - name: Publish npm package
        run: npm publish --access public
        working-directory: packaging/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Container (ghcr.io) ───────────────────────────────────────────────────────
  publish-container:
    name: "Container → ghcr.io"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            V="${{ github.event.release.tag_name }}"
            V="${V#v}"
          else
            V="$(cat VERSION)"
          fi
          echo "Publishing container version: $V"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.GH_OWNER }}/explorerlens
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=ExplorerLens SDK
            org.opencontainers.image.description=GPU-accelerated thumbnail provider SDK for 200+ file formats

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: EXPLORERLENS_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Apache Maven ──────────────────────────────────────────────────────────────
  publish-maven:
    name: "Maven → GitHub Packages"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            V="${{ github.event.release.tag_name }}"
            V="${V#v}"
          else
            V="$(cat VERSION)"
          fi
          echo "Publishing Maven artifact version: $V"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Download release ZIP
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${{ steps.version.outputs.version }}"
          gh release download "v$V" --pattern "ExplorerLens-$V-x64.zip" --dir dist
          unzip "dist/ExplorerLens-$V-x64.zip" -d dist/extracted

      - name: Stage native binaries for Maven JAR
        run: |
          mkdir -p packaging/maven/native
          for BIN in lens.exe LENSShell.dll LENSManager.exe; do
            src=$(find dist/extracted -name "$BIN" 2>/dev/null | head -1)
            if [ -n "$src" ]; then
              cp "$src" packaging/maven/native/
              echo "  Staged: $BIN"
            else
              echo "  Not found in ZIP: $BIN (non-fatal)"
            fi
          done

      - name: Write Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.2.0
                        https://maven.apache.org/xsd/settings-1.2.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Set Maven version and deploy
        working-directory: packaging/maven
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          mvn --batch-mode versions:set -DnewVersion="${{ steps.version.outputs.version }}"
          mvn --batch-mode deploy -DskipTests -s ~/.m2/settings.xml

  # ── RubyGems ──────────────────────────────────────────────────────────────────
  publish-rubygems:
    name: "RubyGems → GitHub Packages"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            V="${{ github.event.release.tag_name }}"
            V="${V#v}"
          else
            V="$(cat VERSION)"
          fi
          echo "Publishing RubyGem version: $V"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Update gem version
        run: |
          V="${{ steps.version.outputs.version }}"
          sed -i "s/VERSION = '.*'/VERSION = '$V'/" packaging/ruby/lib/explorerlens/version.rb

      - name: Build gem
        working-directory: packaging/ruby
        run: gem build explorerlens.gemspec

      - name: Push gem to GitHub Packages RubyGems registry
        working-directory: packaging/ruby
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.gem
          printf ':github: Bearer %s\n' "$GITHUB_TOKEN" > ~/.gem/credentials
          chmod 0600 ~/.gem/credentials
          gem push \
            --key github \
            --host "https://rubygems.pkg.github.com/${{ env.GH_OWNER }}" \
            "explorerlens-${{ steps.version.outputs.version }}.gem"

  # ── Publish Summary ───────────────────────────────────────────────────────────
  publish-summary:
    name: "Publish Summary"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - publish-nuget
      - publish-npm
      - publish-container
      - publish-maven
      - publish-rubygems
    permissions:
      contents: read

    steps:
      - name: Report publish results
        env:
          NUGET_RESULT:     ${{ needs.publish-nuget.result }}
          NPM_RESULT:       ${{ needs.publish-npm.result }}
          CONTAINER_RESULT: ${{ needs.publish-container.result }}
          MAVEN_RESULT:     ${{ needs.publish-maven.result }}
          RUBYGEMS_RESULT:  ${{ needs.publish-rubygems.result }}
        run: |
          status_icon() {
            case "$1" in
              success)  echo "✅" ;;
              skipped)  echo "⏭️" ;;
              *)        echo "❌" ;;
            esac
          }

          echo "## GitHub Packages Publish Summary"                >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                   >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry          | Status |"                    >> "$GITHUB_STEP_SUMMARY"
          echo "|-------------------|--------|"                    >> "$GITHUB_STEP_SUMMARY"
          echo "| NuGet             | $(status_icon "$NUGET_RESULT")     $NUGET_RESULT |"     >> "$GITHUB_STEP_SUMMARY"
          echo "| npm               | $(status_icon "$NPM_RESULT")       $NPM_RESULT |"       >> "$GITHUB_STEP_SUMMARY"
          echo "| Container (ghcr)  | $(status_icon "$CONTAINER_RESULT") $CONTAINER_RESULT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Apache Maven      | $(status_icon "$MAVEN_RESULT")     $MAVEN_RESULT |"     >> "$GITHUB_STEP_SUMMARY"
          echo "| RubyGems          | $(status_icon "$RUBYGEMS_RESULT")  $RUBYGEMS_RESULT |"  >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                   >> "$GITHUB_STEP_SUMMARY"

          FAILED=0
          for result in "$NUGET_RESULT" "$NPM_RESULT" "$CONTAINER_RESULT" "$MAVEN_RESULT" "$RUBYGEMS_RESULT"; do
            [ "$result" = "failure" ] && FAILED=$((FAILED + 1))
          done

          if [ "$FAILED" -eq 0 ]; then
            echo "All package registries published successfully." >> "$GITHUB_STEP_SUMMARY"
            echo "All package registries published successfully."
          else
            echo "⚠️  $FAILED registry/registries failed." >> "$GITHUB_STEP_SUMMARY"
            echo "$FAILED registry/registries failed — check individual job logs."
            exit 1
          fi
