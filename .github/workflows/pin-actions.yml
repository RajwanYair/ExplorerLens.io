# ──────────────────────────────────────────────────────────────────────────────
# pin-actions.yml  ·  Supply-chain: SHA-pin all GitHub Action references (D40)
#
# WHY:  Tag-based action refs (@v4) are mutable — an action author can push
#       new code to the tag after you reference it, enabling supply-chain attacks.
#       SHA-pinned refs (@abc1234…) are immutable (SLSA Level 3+, §13.1).
#
# HOW:  Pin-Actions.ps1 resolves every `uses: owner/repo@vN` in .github/workflows/
#       to its commit SHA via the GitHub API, then rewrites the files.
#       This workflow runs on demand and after each release to create a PR with
#       the pinned replacements for review.
#
# SEE:  ROADMAP D40, .github/standards/lessons-learned.md §13.1 P2
#       build-scripts/utilities/Pin-Actions.ps1
# ──────────────────────────────────────────────────────────────────────────────
name: "Security: Pin GitHub Actions to SHA"

on:
  workflow_dispatch:
    inputs:
      create_pr:
        description: "Create a PR with pinned SHAs (yes/no)"
        required: false
        default: "yes"
        type: choice
        options:
          - "yes"
          - "no"
  # Also runs after a new release so distribution channels stay hardened
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  pin-actions:
    name: Resolve and pin action SHAs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PowerShell 7
        shell: bash
        run: |
          if ! command -v pwsh &>/dev/null; then
            wget -q https://packages.microsoft.com/config/ubuntu/22.04/packages-microsoft-prod.deb
            sudo dpkg -i packages-microsoft-prod.deb
            sudo apt-get update -qq
            sudo apt-get install -y powershell
          fi
          pwsh --version

      - name: Dry-run — report unpinned action refs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          Write-Host "=== Scanning workflow files for unpinned action refs ===" -ForegroundColor Cyan
          & "$env:GITHUB_WORKSPACE/build-scripts/utilities/Pin-Actions.ps1" `
              -WorkflowDir "$env:GITHUB_WORKSPACE/.github/workflows" `
              -Token "$env:GITHUB_TOKEN"

      - name: Apply — rewrite workflow files with pinned SHAs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          Write-Host "=== Applying SHA pins to workflow files ===" -ForegroundColor Green
          & "$env:GITHUB_WORKSPACE/build-scripts/utilities/Pin-Actions.ps1" `
              -WorkflowDir "$env:GITHUB_WORKSPACE/.github/workflows" `
              -Token "$env:GITHUB_TOKEN" `
              -Apply

      - name: Check for changes
        id: diff
        shell: bash
        run: |
          if git diff --quiet .github/workflows/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No unpinned action refs found — all workflows already SHA-pinned."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Pinned action refs detected — creating PR."
            git diff --stat .github/workflows/
          fi

      - name: Create pull request with pinned SHAs
        if: steps.diff.outputs.changed == 'true' && (github.event.inputs.create_pr != 'no')
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: security/pin-actions-${{ github.run_number }}
          commit-message: "ci(security): SHA-pin GitHub Action refs (D40, §13.1)"
          title: "ci(security): SHA-pin all GitHub Action references (SLSA §13.1)"
          body: |
            ## Summary
            Resolves all `uses: owner/repo@vN` tag references in `.github/workflows/`
            to their immutable commit SHAs as required by ROADMAP D40 (SLSA §13.1).

            ### Why
            Tag-based action refs are mutable — an action author can push new code to
            the same tag after you reference it. SHA-pinned refs are immutable.

            ### How
            Generated by `build-scripts/utilities/Pin-Actions.ps1 -Apply` via the
            `Security: Pin GitHub Actions to SHA` workflow.

            ### Review checklist
            - [ ] All changed action refs have a `# renovate: tag=vN` comment
            - [ ] No unexpected files changed outside `.github/workflows/`
            - [ ] CI passes on this branch
          labels: |
            security
            ci
            automated-pr
          draft: false
