name: Catch2 Unit Tests

# Sprint 18 — Dedicated Catch2 test runner.
# Runs EngineCatch2Tests on every push that touches the Engine.
# Faster iteration than the full corpus-validation workflow.

on:
  push:
    branches: [main]
    paths:
      - "Engine/**"
      - ".github/workflows/catch2-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "Engine/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: catch2-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  catch2:
    name: Catch2 Engine Tests
    runs-on: windows-latest
    timeout-minutes: 30

    env:
      GIT_CONFIG_COUNT: 1
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: "*"

    steps:
      - name: Configure git safe.directory
        shell: pwsh
        run: git config --global safe.directory '*'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@v4.3.1

      - name: Restore external library cache
        uses: actions/cache@v4
        with:
          path: external
          key: external-libs-${{ hashFiles('external/LIBRARY_INVENTORY.md') }}

      - name: Configure (CMake — enable Catch2)
        shell: pwsh
        run: cmake --preset default-release -DBUILD_CATCH2_TESTS=ON

      - name: Build engine + Catch2 tests
        shell: pwsh
        run: cmake --build --preset default-release --target EngineCatch2Tests -j 4

      - name: Run Catch2 tests (XML report)
        shell: pwsh
        run: |
          $exe = "build\bin\EngineCatch2Tests.exe"
          if (-not (Test-Path $exe)) {
              Write-Warning "EngineCatch2Tests.exe not found — checking alternate paths"
              $exe = (Get-ChildItem build -Recurse -Filter EngineCatch2Tests.exe -ErrorAction SilentlyContinue |
                      Select-Object -First 1).FullName
          }
          if ($exe) {
              Write-Host "Running $exe"
              & $exe --reporter junit --out build\catch2-results.xml
              $exit = $LASTEXITCODE
              Write-Host "Catch2 exit code: $exit"
              exit $exit
          } else {
              Write-Error "EngineCatch2Tests.exe not found anywhere in build/"
              exit 1
          }

      - name: Summary — parse Catch2 results
        if: always()
        shell: pwsh
        run: |
          $xml = "build\catch2-results.xml"
          if (Test-Path $xml) {
              [xml]$doc = Get-Content $xml
              $suite = $doc.testsuites.testsuite
              if ($suite) {
                  $total  = [int]$suite.tests
                  $failed = [int]$suite.failures + [int]$suite.errors
                  $passed = $total - $failed
                  Write-Host "Catch2 Results: $passed/$total passed, $failed failed"
                  $summary = @"
          ## Catch2 Test Results
          | Total | Passed | Failed |
          |-------|--------|--------|
          | $total | $passed | $failed |
          "@
                  $summary | Add-Content $env:GITHUB_STEP_SUMMARY
              }
          }

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Catch2 Engine Tests
          path: build/catch2-results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: catch2-results-${{ github.run_number }}
          path: build/catch2-results.xml
          retention-days: 14
