# Dependabot Configuration
# Automated dependency updates for all projects

version: 2
updates:
  # ============================================================================
  # PYTHON DEPENDENCIES
  # ============================================================================
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # Group updates to reduce PR noise
    groups:
      dev-dependencies:
        patterns:
          - "pytest*"
          - "black"
          - "flake8"
          - "mypy"
          - "coverage"
          - "bandit"
          - "isort"
      web-frameworks:
        patterns:
          - "fastapi*"
          - "uvicorn*"
          - "flask*"
          - "jinja2"
      data-processing:
        patterns:
          - "pandas*"
          - "numpy*"
          - "pillow*"

  # ============================================================================
  # GITHUB ACTIONS
  # ============================================================================
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    # Group ALL GitHub Actions updates into a single weekly PR to reduce CI noise.
    # Without groups, Dependabot opens one PR per action, each of which triggers
    # CI runs — generating 5-10 failure issues per batch.
    groups:
      github-actions-all:
        patterns:
          - "*"

  # ============================================================================
  # VCPKG (C++ package manager manifest)
  # ============================================================================
  # Dependabot doesn't have a native vcpkg ecosystem; we use the 'bundler'
  # workaround to monitor vcpkg.json version field.  The real driver for vcpkg
  # updates is the Bump-Version.ps1 script which stamps vcpkg.json on every
  # release.  This entry exists to surface GitHub Security advisories for the
  # vcpkg baseline and any transient C++ library CVEs picked up by Dependabot.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "vcpkg"
      - "c++"
    commit-message:
      prefix: "chore(vcpkg)"
    open-pull-requests-limit: 2
