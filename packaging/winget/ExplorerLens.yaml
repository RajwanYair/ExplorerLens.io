ShortDescription: GPU-accelerated thumbnail provider for Windows Explorer (200+ file formats)
Description: |-
  ExplorerLens is a Windows Shell Extension (IThumbnailProvider COM DLL) that generates
  GPU-accelerated thumbnails for 200+ file formats across 25 specialized decoders.

  Supported formats include:
  • Images: JPEG, PNG, WebP, AVIF, HEIC, JPEG XL, GIF, BMP, TIFF, EXR, QOI
  • Camera RAW: CR2, CR3, NEF, ARW, DNG, RAF, ORF (via LibRaw embedded preview)
  • Archives: ZIP, CBZ, RAR, CBR, 7z (cover image extraction)
  • Documents: PDF (MuPDF), PSD, SVG
  • 3D/CAD: glTF, STL, OBJ

  Features:
  • DirectX 11 GPU-accelerated decode pipeline
  • Sub-1ms L1 cache with persistent L2 disk cache (configurable budget)
  • Zero-copy upload path for large images
  • ETW structured telemetry + per-format performance counters
  • LENSManager configuration GUI

